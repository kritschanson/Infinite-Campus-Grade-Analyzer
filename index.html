  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback, useRef } = React;

// ─── CSV Parsing ──────────────────────────────────────────────────────────────

function parseCSVFull(text) {
  const rows = [];
  let cur = [], cell = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQ && text[i + 1] === '"') { cell += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      cur.push(cell); cell = "";
    } else if ((ch === '\n' || ch === '\r') && !inQ) {
      if (ch === '\r' && text[i + 1] === '\n') i++;
      cur.push(cell); cell = "";
      if (cur.some(c => c.trim())) rows.push(cur);
      cur = [];
    } else {
      cell += ch;
    }
  }
  if (cell || cur.length) { cur.push(cell); if (cur.some(c => c.trim())) rows.push(cur); }
  return rows;
}

// Parse IC Gradebook Export CSV
// Row 0: Assignment Name, [Assess1], [Assess2], ...  (last column = most recent)
// Row 1: Task/Standard Name, Grade, Grade, ...
// Row 2: (blank), [pts1], [pts2], ...
// Row 3+: "LastName, First MI #ID", score1, score2, ...
//
// Returns sections with:
//   currentAssessment  — name of the rightmost assessment
//   students[].history — all prior assessments as [{ assessment, score }]
//   students[].pct     — score % on the current (most recent) assessment
function parseICGradebook(rows, teacherLabel) {
  if (rows.length < 4) return null;

  // Build validCols: each column that has a non-blank name AND a valid points-possible
  const rawNames = rows[0].slice(1);
  const rawPossible = rows[2].slice(1);
  const validCols = [];
  rawNames.forEach((n, i) => {
    const name = n.trim();
    const possible = parseFloat((rawPossible[i] || "").trim());
    if (name && !isNaN(possible) && possible > 0) {
      validCols.push({ name, possible, colIndex: i + 1 });
    }
  });

  if (validCols.length === 0) return null;

  // Most recent = last valid column
  const currentCol = validCols[validCols.length - 1];
  const historyCols = validCols.slice(0, -1);

  const students = [];
  for (let r = 3; r < rows.length; r++) {
    const row = rows[r];
    const raw = (row[0] || "").trim();
    if (!raw) continue;

    // Parse "LastName, FirstName MI #StudentID"
    const idMatch = raw.match(/#(\d+)/);
    const studentId = idMatch ? idMatch[1] : "";
    const namePart = raw.replace(/#\d+/, "").trim().replace(/,\s*$/, "").trim();

    // Convert "Last, First MI" → "First MI Last"
    const commaIdx = namePart.indexOf(",");
    let name;
    if (commaIdx !== -1) {
      const last = namePart.slice(0, commaIdx).trim();
      const first = namePart.slice(commaIdx + 1).trim();
      name = first ? `${first} ${last}` : last;
    } else {
      name = namePart;
    }

    // Current score → pct
    const rawScore = parseFloat((row[currentCol.colIndex] || "").trim());
    const pct = isNaN(rawScore) ? null : Math.round((rawScore / currentCol.possible) * 100);

    // Prior scores → history array (in order, oldest first)
    const history = historyCols.map(col => {
      const val = parseFloat((row[col.colIndex] || "").trim());
      if (isNaN(val)) return null;
      return { assessment: col.name, score: Math.round((val / col.possible) * 100) };
    }).filter(Boolean);

    students.push({ name, studentId, pct, history });
  }

  return {
    teacherLabel,
    students,
    validCols,
    currentAssessment: currentCol.name,
    historyCols,
  };
}

// Parse subgroup CSV — new format:
// Col 0: Student Name
// Col 1: Student ID (with or without # prefix)
// Col 2+: Category columns (e.g. "Program", "Language") where cell value = subgroup label
//         Any non-blank cell value = student belongs to that subgroup with that label
//         e.g. row: "Ahmed, Aseel, 888206511, IEP, ELL" → subgroups: ["IEP", "ELL"]
function parseSubgroupCSV(rows) {
  if (!rows.length) return {};
  const headers = rows[0].map(h => h.trim());

  // Find name and ID columns by header name, defaulting to cols 0 and 1
  const nameIdx = (() => {
    const i = headers.findIndex(h => /student\s*name|^name$/i.test(h));
    return i !== -1 ? i : 0;
  })();
  const idIdx = (() => {
    const i = headers.findIndex(h => /student\s*id|^id$|^#/i.test(h));
    return i !== -1 ? i : 1;
  })();

  // All remaining columns are subgroup category columns
  const sgColIdxs = headers.map((_, i) => i).filter(i => i !== nameIdx && i !== idIdx);

  const map = {};
  rows.slice(1).forEach(row => {
    const rawName = (row[nameIdx] || "").trim();
    const rawId   = (row[idIdx]   || "").trim().replace(/^#/, ""); // strip leading #
    if (!rawName && !rawId) return;

    // Normalise name: "Last, First" → "First Last" if comma present
    let name = rawName;
    const ci = rawName.indexOf(",");
    if (ci !== -1) {
      const last  = rawName.slice(0, ci).trim();
      const first = rawName.slice(ci + 1).trim();
      name = first ? `${first} ${last}` : last;
    }

    const subgroups = sgColIdxs
      .map(i => (row[i] || "").trim())
      .filter(Boolean); // any non-blank value = membership label

    const key = rawId || name;
    if (!map[key]) map[key] = { name, id: rawId, subgroups: [] };
    // Merge subgroups in case of duplicate rows
    subgroups.forEach(sg => {
      if (!map[key].subgroups.includes(sg)) map[key].subgroups.push(sg);
    });
  });
  return map;
}

// Parse prior analytics CSV
function parsePriorAnalyticsCSV(rows) {
  if (!rows.length) return {};
  const headers = rows[0].map(h => h.trim());
  const fixedCols = 3;
  const assessments = [];
  for (let i = fixedCols; i < headers.length - 1; i += 2) {
    const dateCol = headers[i];
    const scoreCol = headers[i + 1];
    const name = dateCol.replace(/\|Date$/, "").trim();
    assessments.push({ name, dateColIdx: i, scoreColIdx: i + 1 });
  }
  const map = {};
  rows.slice(1).forEach(row => {
    const id = (row[0] || "").trim();
    const name = (row[1] || "").trim();
    if (!id && !name) return;
    const key = id || name;
    const subgroups = (row[2] || "").split(";").map(s => s.trim()).filter(Boolean);
    const history = [];
    assessments.forEach(a => {
      const date = (row[a.dateColIdx] || "").trim();
      const score = parseFloat(row[a.scoreColIdx]);
      if (date && !isNaN(score)) history.push({ assessment: a.name, date, score });
    });
    map[key] = { name, id, subgroups, history };
  });
  return map;
}

// ─── Stats Helpers ────────────────────────────────────────────────────────────

function computeStats(scores) {
  const valid = scores.filter(s => s !== null && !isNaN(s));
  if (!valid.length) return { mean: 0, median: 0, high: 0, low: 0, stdDev: 0 };
  const mean = valid.reduce((a, b) => a + b, 0) / valid.length;
  const sorted = [...valid].sort((a, b) => a - b);
  const mid = Math.floor(sorted.length / 2);
  const median = sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
  const variance = valid.reduce((a, b) => a + (b - mean) ** 2, 0) / valid.length;
  const stdDev = Math.sqrt(variance);
  return {
    mean: Math.round(mean * 10) / 10,
    median: Math.round(median * 10) / 10,
    high: Math.max(...valid),
    low: Math.min(...valid),
    stdDev: Math.round(stdDev * 10) / 10
  };
}

function gradeDist(pcts) {
  return {
    A: pcts.filter(p => p >= 90).length,
    B: pcts.filter(p => p >= 80 && p < 90).length,
    C: pcts.filter(p => p >= 70 && p < 80).length,
    D: pcts.filter(p => p >= 60 && p < 70).length,
    F: pcts.filter(p => p < 60).length,
  };
}

// ─── Growth & Risk Logic ──────────────────────────────────────────────────────

// History comes from two sources (merged, de-duped by assessment name):
//   1. In-file prior columns (students[].history built during CSV parse) — primary
//   2. priorMap (uploaded Analytics CSV) — supplementary for cross-trimester scores
//      that predate what's in the current gradebook file
//
// assessmentName = the current (most recent) assessment being analyzed

function buildGrowthData(sections, assessmentName, subgroupMap, priorMap) {
  // Collect all students with their current pct and in-file history
  const allStudents = [];
  sections.forEach(sec => {
    sec.students.forEach(stu => {
      if (stu.pct === null) return;
      allStudents.push({ ...stu, teacherLabel: sec.teacherLabel, teacherName: sec.teacherName || sec.teacherLabel });
    });
  });

  const totalStudents = allStudents.length;
  const classAvg = totalStudents > 0
    ? Math.round(allStudents.reduce((a, s) => a + s.pct, 0) / totalStudents)
    : 0;

  const getSubgroupInfo = (stu) => {
    if (!subgroupMap) return null;
    if (stu.studentId && subgroupMap[stu.studentId]) return subgroupMap[stu.studentId];
    if (subgroupMap[stu.name]) return subgroupMap[stu.name];
    return Object.values(subgroupMap).find(v => v.id === stu.studentId || v.name === stu.name) || null;
  };

  const getPriorInfo = (stu) => {
    if (!priorMap) return null;
    if (stu.studentId && priorMap[stu.studentId]) return priorMap[stu.studentId];
    if (priorMap[stu.name]) return priorMap[stu.name];
    return Object.values(priorMap).find(v => v.id === stu.studentId || v.name === stu.name) || null;
  };

  // Derive risk status by replaying the full score sequence oldest → newest.
  //
  // Step-down chain when a student scores proficient after struggling:
  //   PERSISTENTLY_AT_RISK → proficient → AT_RISK
  //   AT_RISK              → proficient → RECOVERING
  //   RECOVERING           → proficient → OK (cleared)
  //
  // Short-circuit: two consecutive proficient scores always clears immediately,
  // regardless of prior status (e.g. F F F P P → OK, not Recovering).
  const computeRiskStatus = (allScores) => {
    // allScores: array of % values oldest → newest (includes current as last entry)
    if (allScores.length === 0) return "OK";

    // Replay the sequence, updating status at each step
    let status = "OK";
    for (let i = 0; i < allScores.length; i++) {
      const prof = allScores[i] >= 70;
      if (!prof) {
        // Not proficient: escalate or hold at risk level
        if (status === "PERSISTENTLY_AT_RISK" || status === "AT_RISK") {
          status = "PERSISTENTLY_AT_RISK";
        } else {
          status = "AT_RISK";
        }
      } else {
        // Proficient: two consecutive proficient scores always clears
        const prevProf = i > 0 && allScores[i - 1] >= 70;
        if (prevProf) {
          status = "OK";
        } else {
          // One proficient score: step down one level
          if (status === "PERSISTENTLY_AT_RISK") status = "AT_RISK";
          else if (status === "AT_RISK") status = "RECOVERING";
          else if (status === "RECOVERING") status = "OK";
          // else already OK, stays OK
        }
      }
    }
    return status;
  };

  const enriched = allStudents.map(stu => {
    const sg = getSubgroupInfo(stu);
    const pr = getPriorInfo(stu);

    // Subgroups: from subgroup CSV, fall back to analytics CSV
    const subgroups = sg ? sg.subgroups : (pr ? pr.subgroups : []);

    // Build merged history:
    // Start with any cross-trimester history from the analytics CSV that isn't
    // already covered by the in-file columns (match by assessment name).
    const inFileNames = new Set(stu.history.map(h => h.assessment));
    const crossTermHistory = pr
      ? pr.history.filter(h => !inFileNames.has(h.assessment))
      : [];

    // Full ordered history: cross-term (oldest) + in-file (newest prior columns)
    const history = [...crossTermHistory, ...stu.history];

    const currentEntry = { assessment: assessmentName, score: stu.pct };
    const proficient = stu.pct >= 70;

    // Build the full score sequence (history scores + current) for risk calculation
    const allScores = [...history.map(h => h.score), stu.pct];
    const riskStatus = computeRiskStatus(allScores);

    return { ...stu, subgroups, history, currentEntry, riskStatus, proficient };
  });

  // ── Subgroup stats ────────────────────────────────────────────────────────
  const subgroupStats = {};
  if (subgroupMap || priorMap) {
    const allSgs = new Set();
    enriched.forEach(s => s.subgroups.forEach(sg => allSgs.add(sg)));
    allSgs.forEach(sgName => {
      const members = enriched.filter(s => s.subgroups.includes(sgName));
      if (!members.length) return;
      const avg = Math.round(members.reduce((a, s) => a + s.pct, 0) / members.length);
      const gap = avg - classAvg;
      const flagged = gap < -10;

      let priorAvg = null;
      const withHist = members.filter(s => s.history.length > 0);
      if (withHist.length > 0) {
        const lastScores = withHist.map(s => s.history[s.history.length - 1].score);
        priorAvg = Math.round(lastScores.reduce((a, b) => a + b, 0) / lastScores.length);
      }
      let priorClassAvg = null;
      const allWithHist = enriched.filter(s => s.history.length > 0);
      if (allWithHist.length > 0) {
        const last = allWithHist.map(s => s.history[s.history.length - 1].score);
        priorClassAvg = Math.round(last.reduce((a, b) => a + b, 0) / last.length);
      }
      let trend = null;
      if (priorAvg !== null && priorClassAvg !== null) {
        const priorGap = priorAvg - priorClassAvg;
        if (gap > priorGap + 2) trend = "closing";
        else if (gap < priorGap - 2) trend = "widening";
        else trend = "holding";
      }
      subgroupStats[sgName] = { name: sgName, count: members.length, avg, gap, flagged, trend, priorAvg, large: members.length > 20 };
    });
  }

  return { enriched, subgroupStats, classAvg, totalStudents };
}

// ─── Section Card ─────────────────────────────────────────────────────────────

function SectionCard({ section, onRemove }) {
  const { teacherLabel, students, validCols, currentAssessment, historyCols } = section;

  const pcts = students.map(s => s.pct).filter(v => v !== null);
  const profCount = pcts.filter(p => p >= 70).length;
  const profPct = pcts.length > 0 ? Math.round((profCount / pcts.length) * 100) : 0;
  const dist = gradeDist(pcts);

  return (
    <div style={{ background: "white", borderRadius: 10, padding: "1rem 1.1rem", boxShadow: "0 2px 8px rgba(15,23,42,0.08)", borderTop: "4px solid #0f766e" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.92rem" }}>{teacherLabel}</div>
        <button onClick={() => onRemove(teacherLabel)} style={{ background: "none", border: "none", color: "#94a3b8", cursor: "pointer", fontSize: "1rem", padding: 0 }}>✕</button>
      </div>
      <div style={{ fontSize: "0.7rem", color: "#64748b", marginTop: "0.2rem" }}>
        {students.length} students · analyzing: <strong style={{ color: "#0f766e" }}>{currentAssessment}</strong>
        {historyCols.length > 0 && <span> · {historyCols.length} prior assessment{historyCols.length !== 1 ? "s" : ""}</span>}
      </div>

      {pcts.length > 0 && (
        <div style={{ marginTop: "0.75rem" }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: "0.7rem", fontWeight: 700, marginBottom: "0.2rem" }}>
            <span style={{ color: "#0f172a" }}>% Proficient (≥70%)</span>
            <span style={{ color: profPct >= 70 ? "#15803d" : "#dc2626" }}>{profPct}%</span>
          </div>
          <div style={{ height: 7, background: "#e2e8f0", borderRadius: 4, overflow: "hidden" }}>
            <div style={{ width: profPct + "%", height: "100%", background: profPct >= 70 ? "#15803d" : profPct >= 50 ? "#d97706" : "#dc2626", borderRadius: 4, transition: "width 0.4s" }} />
          </div>
          <div style={{ fontSize: "0.65rem", color: "#64748b", marginTop: "0.15rem" }}>{profCount} proficient · {pcts.length - profCount} not proficient</div>

          <div style={{ marginTop: "0.6rem" }}>
            <div style={{ fontSize: "0.62rem", fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: "0.25rem" }}>Distribution</div>
            {(() => {
              const maxCount = Math.max(...Object.values(dist), 1);
              const chartH = maxCount * 3.5 + 16;
              return (
                <div style={{ display: "flex", alignItems: "flex-end", gap: "0.2rem", height: chartH }}>
                  {[["A","#15803d"],["B","#65a30d"],["C","#d97706"],["D","#ea580c"],["F","#dc2626"]].map(([g, color]) => {
                    const count = dist[g];
                    return (
                      <div key={g} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-end", gap: "0.1rem" }}>
                        {count > 0 && <div style={{ fontSize: "0.58rem", fontWeight: 700, color }}>{count}</div>}
                        <div style={{ width: "100%", height: count * 3.5, background: color, borderRadius: "2px 2px 0 0", minHeight: count > 0 ? 2 : 0 }} />
                        <div style={{ fontSize: "0.58rem", fontWeight: 700, color }}>{g}</div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────

function App() {
  const [sections, setSections] = useState([]); // [{ teacherLabel, students, validCols, currentAssessment, historyCols }]
  const [subgroupMap, setSubgroupMap] = useState(null);
  const [priorMap, setPriorMap] = useState(null);
  const [activeTab, setActiveTab] = useState("upload");
  const [report, setReport] = useState(null);
  const [growthData, setGrowthData] = useState(null);
  const [error, setError] = useState("");
  const [dragOver, setDragOver] = useState(false);

  const [studentTableOpen, setStudentTableOpen] = useState(true);

  // Derive the assessment name to analyze: the currentAssessment from the first loaded section
  // (all sections should agree since they share the same trimester gradebook export)
  const currentAssessmentName = sections.length > 0 ? sections[0].currentAssessment : "";

  const processFiles = useCallback((files) => {
    setError("");
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const text = e.target.result;
          const rows = parseCSVFull(text);
          if (!rows.length) return;

          const name = file.name.replace(/\.csv$/i, "").trim();
          const lname = name.toLowerCase();

          // Subgroup file
          if (lname.includes("subgroup")) {
            setSubgroupMap(parseSubgroupCSV(rows));
            return;
          }
          // Prior analytics (optional, cross-trimester only)
          if (lname.includes("analytics") || lname.includes("prior")) {
            setPriorMap(parsePriorAnalyticsCSV(rows));
            return;
          }

          // Detect IC gradebook by checking row 0 col 0
          const firstCell = (rows[0]?.[0] || "").trim().toLowerCase();
          if (firstCell === "assignment name") {
            const teacherLabel = name;
            // Extract base teacher name by stripping trailing period/section patterns
            // e.g. "Smith Period 1" -> "Smith", "Jones P2" -> "Jones", "Garcia 3" -> "Garcia"
            const teacherName = name
              .replace(/[\s\-\u2013_]+(?:period|per|pd|section|sec|p)[\s\-\u2013_]*\d+\s*$/i, "")
              .replace(/[\s\-\u2013_]+\d+\s*$/, "")
              .trim() || name;
            const parsed = parseICGradebook(rows, teacherLabel);
            if (!parsed || parsed.students.length === 0) {
              setError(`Could not parse "${file.name}" — no student data found.`);
              return;
            }
            // Attach teacherName to parsed section
            parsed.teacherName = teacherName;
            setSections(prev => {
              const filtered = prev.filter(s => s.teacherLabel !== teacherLabel);
              return [...filtered, parsed];
            });
            return;
          }

          setError(`"${file.name}" doesn't look like an IC Gradebook, Subgroup, or Analytics CSV.`);
        } catch (err) {
          setError("Error reading file: " + err.message);
        }
      };
      reader.readAsText(file);
    });
  }, []);

  const onDrop = useCallback((e) => {
    e.preventDefault();
    setDragOver(false);
    processFiles(e.dataTransfer.files);
  }, [processFiles]);

  const removeSection = (label) => {
    setSections(prev => prev.filter(s => s.teacherLabel !== label));
  };

  const generateReport = () => {
    if (!sections.length) { setError("No gradebook files loaded."); return; }

    // Compute combined stats using each section's built-in current pct
    const allPcts = sections.flatMap(sec => sec.students.map(s => s.pct).filter(v => v !== null));

    const stats = computeStats(allPcts);
    const dist = gradeDist(allPcts);
    const proficient = allPcts.filter(p => p >= 70).length;
    const notProficient = allPcts.length - proficient;
    const proficiencyPct = allPcts.length > 0 ? Math.round((proficient / allPcts.length) * 100) : 0;

    setReport({ stats, dist, proficient, notProficient, proficiencyPct, totalStudents: allPcts.length });
    const gd = buildGrowthData(sections, currentAssessmentName, subgroupMap, priorMap);
    setGrowthData(gd);
    setActiveTab("analysis");
  };

  const GRADE_COLORS = { A:"#15803d", B:"#65a30d", C:"#d97706", D:"#ea580c", F:"#dc2626" };
  const GRADE_BGS = { A:"#dcfce7", B:"#f0fdf4", C:"#fef9c3", D:"#fff7ed", F:"#fee2e2" };

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh", background: "#f1f5f9" }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%)", padding: "0.9rem 1.5rem", display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
          <div style={{ width: 36, height: 36, background: "rgba(20,184,166,0.25)", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1.1rem" }}>📊</div>
          <div>
            <div style={{ fontFamily: "'Lora', serif", fontWeight: 700, color: "white", fontSize: "1.05rem", letterSpacing: "0.01em" }}>IC Grade Analyzer</div>
            <div style={{ fontSize: "0.68rem", color: "#94a3b8", letterSpacing: "0.04em", textTransform: "uppercase" }}>Infinite Campus · PLC Report Tool</div>
          </div>
        </div>
        {/* Assessment selector */}
        {currentAssessmentName && (
          <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
            <span style={{ fontSize: "0.68rem", color: "#64748b", textTransform: "uppercase", letterSpacing: "0.05em" }}>Analyzing:</span>
            <span style={{ background: "rgba(20,184,166,0.2)", color: "#5eead4", borderRadius: 6, padding: "0.25rem 0.65rem", fontSize: "0.8rem", fontWeight: 700 }}>{currentAssessmentName}</span>

      {/* Tabs */}
      <div className="no-print" style={{ background: "white", borderBottom: "1px solid #e2e8f0", display: "flex", padding: "0 1.5rem", flexShrink: 0 }}>
        {[["upload","📁 Upload"],["data","📋 Data"],["analysis","📈 Analysis"]].map(([key, label]) => (
          <button key={key} onClick={() => setActiveTab(key)}
            style={{ background: "none", border: "none", borderBottom: activeTab === key ? "3px solid #0f766e" : "3px solid transparent", color: activeTab === key ? "#0f766e" : "#64748b", fontFamily: "inherit", fontWeight: 700, fontSize: "0.82rem", padding: "0.75rem 1.1rem", cursor: "pointer", transition: "all 0.15s" }}>
            {label} {key === "data" && sections.length > 0 && <span style={{ background: "#f0fdfa", color: "#0f766e", borderRadius: 20, padding: "0.05rem 0.4rem", fontSize: "0.68rem", marginLeft: "0.2rem", fontWeight: 800 }}>{sections.length}</span>}
          </button>
        ))}
      </div>

      {/* Main Content */}
      <div style={{ flex: 1, overflowY: "auto", padding: "1.25rem 1.5rem" }}>

        {error && (
          <div className="no-print" style={{ background: "#fef2f2", border: "1px solid #fca5a5", borderRadius: 8, padding: "0.6rem 1rem", marginBottom: "1rem", color: "#dc2626", fontSize: "0.82rem", fontWeight: 600 }}>
            ⚠️ {error} <button onClick={() => setError("")} style={{ background: "none", border: "none", color: "#dc2626", cursor: "pointer", marginLeft: "0.5rem", fontWeight: 700 }}>✕</button>
          </div>
        )}

        {/* ── UPLOAD TAB ── */}
        {activeTab === "upload" && (
          <div>
            <div
              onDragOver={e => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={onDrop}
              onClick={() => document.getElementById("fileIn").click()}
              style={{ border: `2px dashed ${dragOver ? "#0f766e" : "#94a3b8"}`, borderRadius: 12, padding: "2.5rem 2rem", textAlign: "center", cursor: "pointer", background: dragOver ? "#f0fdfa" : "white", transition: "all 0.2s", marginBottom: "1.25rem" }}>
              <div style={{ fontSize: "2.5rem", marginBottom: "0.6rem" }}>📁</div>
              <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.95rem", marginBottom: "0.3rem" }}>Drop IC Gradebook CSVs here</div>
              <div style={{ color: "#64748b", fontSize: "0.82rem" }}>or click to browse — supports multiple files at once</div>
              <input id="fileIn" type="file" accept=".csv" multiple onChange={e => processFiles(e.target.files)} style={{ display: "none" }} />
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.75rem", marginBottom: "1.25rem" }}>
              {[
                { icon: "📊", title: "IC Gradebook CSVs", desc: "Infinite Campus → Gradebook → Export. One file per class period.", detail: "Name each file with the teacher name and period (e.g. Smith Period 1.csv). The most recent assessment column is analyzed automatically — all prior columns become score history for risk tracking.", highlight: true },
                { icon: "👥", title: "Subgroup CSV (optional)", desc: "Must include 'subgroup' in filename.", detail: "Columns: Student Name, Student ID, then one column per subgroup category. Cell value = subgroup label (e.g. 'IEP', 'ELL'). Blank = not a member.", highlight: false },
                { icon: "📈", title: "Prior Analytics CSV (optional)", desc: "Must include 'analytics' or 'prior' in filename.", detail: "Generated by this tool. Upload for cross-trimester score history when students' earlier scores aren't in the current gradebook file.", highlight: false },
              ].map(({ icon, title, desc, detail, highlight }) => (
                <div key={title} style={{ background: highlight ? "#f0fdfa" : "white", borderRadius: 10, padding: "0.9rem 1.1rem", border: `1px solid ${highlight ? "#99f6e4" : "#e2e8f0"}` }}>
                  <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.85rem", marginBottom: "0.2rem" }}>{icon} {title}</div>
                  <div style={{ fontSize: "0.75rem", color: "#475569", marginBottom: "0.25rem" }}>{desc}</div>
                  <div style={{ fontSize: "0.7rem", color: "#94a3b8", lineHeight: 1.5 }}>{detail}</div>
                </div>
              ))}
            </div>

            {/* Status badges */}
            <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", marginBottom: sections.length > 0 ? "1.25rem" : 0 }}>
              <span style={{ background: subgroupMap ? "#dcfce7" : "#f1f5f9", color: subgroupMap ? "#15803d" : "#64748b", borderRadius: 20, padding: "0.2rem 0.65rem", fontSize: "0.72rem", fontWeight: 700, border: "1px solid " + (subgroupMap ? "#86efac" : "#e2e8f0") }}>
                {subgroupMap ? "✓ Subgroup data loaded" : "○ No subgroup data"}
              </span>
              {priorMap && (
                <span style={{ background: "#dcfce7", color: "#15803d", borderRadius: 20, padding: "0.2rem 0.65rem", fontSize: "0.72rem", fontWeight: 700, border: "1px solid #86efac" }}>
                  ✓ Prior analytics loaded (cross-trimester)
                </span>
              )}
            </div>

            {sections.length > 0 && (
              <div style={{ background: "#f0fdfa", border: "1px solid #99f6e4", borderRadius: 10, padding: "1rem 1.25rem", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: "0.75rem" }}>
                <div>
                  <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.88rem" }}>
                    {sections.length} section{sections.length !== 1 ? "s" : ""} loaded
                    {" · "}{sections.reduce((n, s) => n + s.students.length, 0)} students
                  </div>
                  <div style={{ fontSize: "0.72rem", color: "#0f766e", marginTop: "0.2rem" }}>
                    Analyzing: <strong>{currentAssessmentName}</strong>
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: "0.3rem", marginTop: "0.4rem" }}>
                    {[...new Set(sections.map(s => s.teacherName || s.teacherLabel))].sort().map(name => (
                      <span key={name} style={{ background: "white", border: "1px solid #99f6e4", color: "#0f766e", borderRadius: 20, padding: "0.15rem 0.6rem", fontSize: "0.72rem", fontWeight: 600 }}>
                        {name}
                      </span>
                    ))}
                  </div>
                </div>
                <button onClick={() => setActiveTab("data")}
                  style={{ background: "linear-gradient(135deg, #0f766e, #0d9488)", color: "white", border: "none", borderRadius: 8, padding: "0.6rem 1.4rem", fontSize: "0.88rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", boxShadow: "0 3px 12px rgba(15,118,110,0.3)", whiteSpace: "nowrap" }}>
                  Continue to Data →
                </button>
              </div>
            )}
          </div>
        )}

        {/* ── DATA TAB ── */}
        {activeTab === "data" && sections.length === 0 && (
          <div style={{ textAlign: "center", padding: "3rem", color: "#64748b" }}>
            <div style={{ fontSize: "2.5rem", marginBottom: "0.75rem" }}>📭</div>
            <p>No data yet. Upload IC Gradebook CSV files to get started.</p>
            <button onClick={() => setActiveTab("upload")} style={{ background: "#0f766e", color: "white", border: "none", borderRadius: 8, padding: "0.5rem 1.2rem", fontFamily: "inherit", fontWeight: 600, cursor: "pointer" }}>Upload Files →</button>
          </div>
        )}

        {activeTab === "data" && sections.length > 0 && (
          <div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: "1rem", marginBottom: "1.25rem" }}>
              {sections.map(s => (
                <SectionCard key={s.teacherLabel} section={s} onRemove={removeSection} />
              ))}
              <div onClick={() => document.getElementById("fileIn2").click()}
                style={{ border: "2px dashed #99f6e4", borderRadius: 10, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", cursor: "pointer", background: "white", color: "#0f766e", gap: "0.3rem", minHeight: 100, padding: "1rem" }}>
                <span style={{ fontSize: "1.5rem" }}>＋</span>
                <span style={{ fontSize: "0.82rem", fontWeight: 600 }}>Add more sections</span>
                <input id="fileIn2" type="file" accept=".csv" multiple onChange={e => processFiles(e.target.files)} style={{ display: "none" }} />
              </div>
            </div>

            <div style={{ textAlign: "center", marginBottom: "1.25rem" }}>
              <button onClick={generateReport}
                style={{ background: "linear-gradient(135deg, #0f766e, #0d9488)", color: "white", border: "none", borderRadius: 10, padding: "0.85rem 2.5rem", fontSize: "1rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", boxShadow: "0 4px 18px rgba(15,118,110,0.35)" }}>
                📊 Generate Report — {currentAssessmentName}
              </button>
            </div>

            {/* Student scores preview table — uses built-in pct */}
            {(() => {
              const allStudentRows = sections.flatMap(sec =>
                sec.students
                  .filter(s => s.pct !== null)
                  .map(s => ({ ...s, teacherLabel: sec.teacherLabel,
                    possible: sec.validCols[sec.validCols.length - 1]?.possible ?? 1 }))
              ).sort((a, b) => a.pct - b.pct);
              const totalProf = allStudentRows.filter(s => s.pct >= 70).length;
              const totalProfPct = allStudentRows.length > 0 ? Math.round((totalProf / allStudentRows.length) * 100) : 0;

              return (
                <div style={{ background: "white", borderRadius: 10, overflow: "hidden", boxShadow: "0 2px 8px rgba(15,23,42,0.07)", marginBottom: "1.25rem" }}>
                  <div onClick={() => setStudentTableOpen(o => !o)} style={{ padding: "0.85rem 1.25rem", borderBottom: studentTableOpen ? "1px solid #e2e8f0" : "none", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "0.5rem", cursor: "pointer", userSelect: "none" }}>
                    <h3 style={{ margin: 0, color: "#0f172a", fontFamily: "'Lora', serif", fontSize: "0.92rem" }}>Student Scores — {currentAssessmentName}</h3>
                    <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
                      <span style={{ fontSize: "0.72rem", color: "#64748b" }}>{allStudentRows.length} students</span>
                      <span style={{ background: totalProfPct >= 70 ? "#dcfce7" : "#fee2e2", color: totalProfPct >= 70 ? "#15803d" : "#dc2626", borderRadius: 20, padding: "0.15rem 0.55rem", fontSize: "0.72rem", fontWeight: 700 }}>{totalProfPct}% Proficient</span>
                      <span style={{ color: "#94a3b8", fontSize: "0.8rem", fontWeight: 700 }}>{studentTableOpen ? "▲" : "▼"}</span>
                    </div>
                  </div>
                  {studentTableOpen && (
                    <div style={{ overflowX: "auto" }}>
                      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.8rem" }}>
                        <thead>
                          <tr style={{ background: "#f8fafc" }}>
                            {["Student", ...(sections.length > 1 ? ["Section"] : []), "% Score", "Grade", "Proficiency", "Prior Assessments"].map(h => (
                              <th key={h} style={{ padding: "0.5rem 0.65rem", textAlign: "left", color: "#374151", fontWeight: 700, borderBottom: "2px solid #e2e8f0", fontSize: "0.72rem" }}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {allStudentRows.map((s, i) => {
                            const grade = s.pct >= 90 ? "A" : s.pct >= 80 ? "B" : s.pct >= 70 ? "C" : s.pct >= 60 ? "D" : "F";
                            const gc = GRADE_COLORS[grade];
                            const gb = GRADE_BGS[grade];
                            return (
                              <tr key={i} style={{ borderBottom: "1px solid #f1f5f9", background: i % 2 === 0 ? "white" : "#fafafa" }}>
                                <td style={{ padding: "0.45rem 0.65rem", fontWeight: 500 }}>{s.name}</td>
                                {sections.length > 1 && <td style={{ padding: "0.45rem 0.65rem" }}><span style={{ background: "#f0fdfa", color: "#0f766e", borderRadius: 20, padding: "0.1rem 0.4rem", fontSize: "0.68rem", fontWeight: 600 }}>{s.teacherLabel}</span></td>}
                                <td style={{ padding: "0.45rem 0.65rem" }}>
                                  <div style={{ display: "flex", alignItems: "center", gap: "0.35rem" }}>
                                    <div style={{ width: 50, height: 5, background: "#e2e8f0", borderRadius: 3, overflow: "hidden" }}>
                                      <div style={{ width: `${Math.min(s.pct,100)}%`, height: "100%", background: gc, borderRadius: 3 }} />
                                    </div>
                                    <span style={{ fontWeight: 600 }}>{s.pct}%</span>
                                  </div>
                                </td>
                                <td style={{ padding: "0.45rem 0.65rem" }}><span style={{ background: gb, color: gc, borderRadius: 20, padding: "0.1rem 0.45rem", fontSize: "0.75rem", fontWeight: 800 }}>{grade}</span></td>
                                <td style={{ padding: "0.45rem 0.65rem" }}><span style={{ background: s.pct >= 70 ? "#dcfce7" : "#fee2e2", color: s.pct >= 70 ? "#15803d" : "#dc2626", borderRadius: 20, padding: "0.1rem 0.45rem", fontSize: "0.7rem", fontWeight: 700 }}>{s.pct >= 70 ? "Proficient" : "Not Proficient"}</span></td>
                                <td style={{ padding: "0.45rem 0.65rem" }}>
                                  <div style={{ display: "flex", gap: "0.2rem", flexWrap: "wrap" }}>
                                    {s.history.map((h, j) => (
                                      <span key={j} title={h.assessment} style={{ background: h.score >= 70 ? "#dcfce7" : "#fee2e2", color: h.score >= 70 ? "#15803d" : "#dc2626", borderRadius: 3, padding: "0.1rem 0.3rem", fontSize: "0.65rem", fontWeight: 700 }}>{h.score}%</span>
                                    ))}
                                    {s.history.length === 0 && <span style={{ color: "#94a3b8", fontSize: "0.65rem" }}>—</span>}
                                  </div>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>
              );
            })()}
          </div>
        )}

        {/* ── ANALYSIS TAB ── */}
        {activeTab === "analysis" && !report && (
          <div style={{ textAlign: "center", padding: "3rem", color: "#64748b" }}>
            <div style={{ fontSize: "2.5rem", marginBottom: "0.75rem" }}>📊</div>
            <p>Go to the <strong>Data tab</strong> and click <strong>Generate Report</strong>.</p>
            <button onClick={() => setActiveTab(sections.length ? "data" : "upload")} style={{ background: "#0f766e", color: "white", border: "none", borderRadius: 8, padding: "0.5rem 1.2rem", fontFamily: "inherit", fontWeight: 600, cursor: "pointer" }}>
              {sections.length ? "Go to Data →" : "Upload Files →"}
            </button>
          </div>
        )}

        {activeTab === "analysis" && report && (() => {
          const { stats, dist, proficient, notProficient, proficiencyPct, totalStudents } = report;
          // hasPrior = true when any student has in-file prior columns OR cross-trimester analytics
          const hasPrior = sections.some(sec => sec.historyCols.length > 0) || (priorMap && Object.keys(priorMap).length > 0);

          return (
            <div className="tab-analysis">
              {/* Report header */}
              <div style={{ background: "linear-gradient(135deg, #0f172a, #1e3a5f)", borderRadius: 12, padding: "1.25rem 1.5rem", marginBottom: "1.5rem", color: "white" }}>
                <div style={{ fontFamily: "'Lora', serif", fontSize: "1.2rem", fontWeight: 700, marginBottom: "0.2rem" }}>{currentAssessmentName}</div>
                <div style={{ fontSize: "0.75rem", color: "#94a3b8" }}>{[...new Set(sections.map(s => s.teacherName || s.teacherLabel))].join(" · ")} · {totalStudents} students · {sections.length} section{sections.length !== 1 ? "s" : ""}</div>
              </div>

              {/* ── OVERALL PERFORMANCE ── */}
              <div style={{ marginBottom: "1.75rem" }}>
                <h2 style={{ color: "#0f172a", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.75rem", fontFamily: "'Lora', serif" }}>📋 Overall Performance</h2>

                {/* Stat pills */}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: "0.6rem", marginBottom: "1rem" }}>
                  {[
                    ["Mean", stats.mean + "%", proficiencyPct >= 70 ? "#15803d" : "#dc2626"],
                    ["Median", stats.median + "%", "#0f766e"],
                    ["High", stats.high + "%", "#15803d"],
                    ["Low", stats.low + "%", "#dc2626"],
                    ["Std Dev", stats.stdDev + "%", "#64748b"],
                  ].map(([lbl, val, color]) => (
                    <div key={lbl} style={{ background: "white", borderRadius: 10, padding: "0.75rem 0.5rem", textAlign: "center", boxShadow: "0 1px 4px rgba(15,23,42,0.07)" }}>
                      <div style={{ fontWeight: 800, color, fontSize: "1.15rem" }}>{val}</div>
                      <div style={{ fontSize: "0.65rem", color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.05em", marginTop: "0.15rem" }}>{lbl}</div>
                    </div>
                  ))}
                </div>

                {/* Proficiency summary */}
                <div style={{ background: "white", borderRadius: 10, padding: "1rem 1.25rem", boxShadow: "0 1px 4px rgba(15,23,42,0.07)", marginBottom: "1rem" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.5rem" }}>
                    <span style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.88rem" }}>Proficiency Rate (≥70%)</span>
                    <span style={{ fontWeight: 800, fontSize: "1.1rem", color: proficiencyPct >= 70 ? "#15803d" : "#dc2626" }}>{proficiencyPct}%</span>
                  </div>
                  <div style={{ height: 10, background: "#e2e8f0", borderRadius: 5, overflow: "hidden", marginBottom: "0.4rem" }}>
                    <div style={{ width: proficiencyPct + "%", height: "100%", background: proficiencyPct >= 70 ? "#15803d" : proficiencyPct >= 50 ? "#d97706" : "#dc2626", borderRadius: 5, transition: "width 0.5s" }} />
                  </div>
                  <div style={{ fontSize: "0.72rem", color: "#64748b" }}>{proficient} proficient · {notProficient} not proficient · {totalStudents} total</div>
                </div>

                {/* Grade distribution */}
                <div style={{ background: "white", borderRadius: 10, padding: "1rem 1.25rem", boxShadow: "0 1px 4px rgba(15,23,42,0.07)" }}>
                  <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.85rem", marginBottom: "0.75rem" }}>Grade Distribution</div>
                  <div style={{ display: "flex", gap: "0.6rem", alignItems: "flex-end" }}>
                    {[["A","#15803d","#dcfce7","90–100%"],["B","#65a30d","#f0fdf4","80–89%"],["C","#d97706","#fef9c3","70–79%"],["D","#ea580c","#fff7ed","60–69%"],["F","#dc2626","#fee2e2","<60%"]].map(([g, color, bg, range]) => {
                      const count = dist[g];
                      const pct = totalStudents > 0 ? Math.round((count / totalStudents) * 100) : 0;
                      const barH = Math.max(pct * 1.8, count > 0 ? 4 : 0);
                      return (
                        <div key={g} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: "0.2rem" }}>
                          <div style={{ fontSize: "0.7rem", fontWeight: 700, color }}>{count > 0 ? pct + "%" : ""}</div>
                          <div style={{ width: "100%", height: barH, background: color, borderRadius: "3px 3px 0 0", minHeight: count > 0 ? 4 : 0 }} />
                          <div style={{ width: "100%", height: 2, background: "#e2e8f0" }} />
                          <div style={{ fontWeight: 800, color, fontSize: "0.85rem" }}>{g}</div>
                          <div style={{ fontWeight: 700, color, fontSize: "0.72rem" }}>{count}</div>
                          <div style={{ fontSize: "0.6rem", color: "#94a3b8", textAlign: "center" }}>{range}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Per-teacher summary — group sections by teacherName */}
                {(() => {
                  const teacherNames = [...new Set(sections.map(s => s.teacherName || s.teacherLabel))].sort();
                  if (teacherNames.length <= 1) return null;
                  return (
                    <div style={{ marginTop: "1rem" }}>
                      <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.85rem", marginBottom: "0.5rem" }}>Teacher Breakdown</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: "0.5rem" }}>
                        {teacherNames.map(tName => {
                          const teacherSections = sections.filter(s => (s.teacherName || s.teacherLabel) === tName);
                          const pcts = teacherSections.flatMap(sec => sec.students.map(s => s.pct).filter(v => v !== null));
                          const secStats = computeStats(pcts);
                          const secProf = pcts.filter(p => p >= 70).length;
                          const secProfPct = pcts.length > 0 ? Math.round((secProf / pcts.length) * 100) : 0;
                          const profDiff = secProfPct - proficiencyPct;
                          const periodCount = teacherSections.length;
                          return (
                            <div key={tName} style={{ background: "white", borderRadius: 8, padding: "0.7rem 1rem", boxShadow: "0 1px 4px rgba(15,23,42,0.06)", display: "flex", alignItems: "center", flexWrap: "wrap", gap: "0.75rem" }}>
                              <div style={{ flex: "1 1 120px" }}>
                                <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.85rem" }}>{tName}</div>
                                {periodCount > 1 && <div style={{ fontSize: "0.65rem", color: "#94a3b8" }}>{periodCount} periods combined</div>}
                              </div>
                              <div style={{ fontSize: "0.75rem", color: "#64748b" }}>{pcts.length} students</div>
                              <div style={{ fontSize: "0.75rem" }}>Mean: <strong style={{ color: "#0f766e" }}>{secStats.mean}%</strong></div>
                              <div style={{ fontSize: "0.75rem" }}>Median: <strong style={{ color: "#0f766e" }}>{secStats.median}%</strong></div>
                              <div>
                                <span style={{ background: secProfPct >= 70 ? "#dcfce7" : "#fee2e2", color: secProfPct >= 70 ? "#15803d" : "#dc2626", borderRadius: 20, padding: "0.15rem 0.55rem", fontSize: "0.72rem", fontWeight: 700 }}>{secProfPct}% Proficient</span>
                                <span style={{ fontSize: "0.65rem", color: profDiff >= 0 ? "#15803d" : "#dc2626", marginLeft: "0.35rem", fontWeight: 600 }}>{profDiff >= 0 ? "+" : ""}{profDiff}% vs PLC</span>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })()}
              </div>

              {/* ── SUBGROUP PERFORMANCE ── */}
              {growthData && Object.values(growthData.subgroupStats).some(sg => sg.large) && (
                <div style={{ marginBottom: "1.75rem" }}>
                  <h2 style={{ color: "#0f172a", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.25rem", fontFamily: "'Lora', serif" }}>👥 Subgroup Performance</h2>
                  <p style={{ fontSize: "0.78rem", color: "#64748b", margin: "0 0 0.75rem", lineHeight: 1.5 }}>
                    Subgroups with more than 20 students compared to class average ({growthData.classAvg}%). Groups flagged ⚠️ are more than 10 points below the class average.
                  </p>
                  <div style={{ display: "flex", flexDirection: "column", gap: "0.6rem" }}>
                    {Object.values(growthData.subgroupStats).filter(sg => sg.large).sort((a, b) => a.gap - b.gap).map(sg => {
                      const gapColor = sg.flagged ? "#dc2626" : sg.gap >= 0 ? "#15803d" : "#d97706";
                      const trendSymbol = sg.trend === "closing" ? "↑ Closing gap" : sg.trend === "widening" ? "↓ Widening gap" : sg.trend === "holding" ? "→ Holding steady" : null;
                      const trendColor = sg.trend === "closing" ? "#15803d" : sg.trend === "widening" ? "#dc2626" : "#64748b";
                      return (
                        <div key={sg.name} style={{ border: `1px solid ${sg.flagged ? "#fca5a5" : "#e2e8f0"}`, borderLeft: `4px solid ${gapColor}`, borderRadius: 8, padding: "0.75rem 1rem", background: sg.flagged ? "#fef2f2" : "white" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "0.5rem" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: "0.6rem" }}>
                              <span style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.9rem" }}>{sg.name}</span>
                              <span style={{ fontSize: "0.7rem", color: "#64748b" }}>n={sg.count}</span>
                              {sg.flagged && <span style={{ background: "#fee2e2", color: "#dc2626", borderRadius: 4, padding: "0.1rem 0.45rem", fontSize: "0.68rem", fontWeight: 800 }}>⚠️ GAP</span>}
                            </div>
                            <div style={{ display: "flex", gap: "1rem", alignItems: "center", flexWrap: "wrap" }}>
                              <span style={{ fontSize: "0.85rem" }}>Avg: <strong style={{ color: gapColor }}>{sg.avg}%</strong></span>
                              <span style={{ fontSize: "0.85rem", color: gapColor, fontWeight: 700 }}>{sg.gap >= 0 ? "+" : ""}{sg.gap} pts vs class</span>
                              {trendSymbol && <span style={{ fontSize: "0.78rem", color: trendColor, fontWeight: 600 }}>{trendSymbol}</span>}
                            </div>
                          </div>
                          <div style={{ marginTop: "0.5rem", height: 6, background: "#e2e8f0", borderRadius: 3, overflow: "hidden", position: "relative" }}>
                            <div style={{ position: "absolute", left: Math.min(growthData.classAvg, 100) + "%", top: 0, bottom: 0, width: 2, background: "#94a3b8" }} />
                            <div style={{ width: Math.min(sg.avg, 100) + "%", height: "100%", background: gapColor, borderRadius: 3 }} />
                          </div>
                          <div style={{ fontSize: "0.65rem", color: "#94a3b8", marginTop: "0.3rem" }}>Class avg: {growthData.classAvg}%</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* ── STUDENT RISK TRACKING ── */}
              {growthData && (() => {
                const riskOrder = { "PERSISTENTLY_AT_RISK": 0, "AT_RISK": 1, "RECOVERING": 2, "OK": 3 };
                const byTeacher = {};
                growthData.enriched.forEach(s => {
                  const t = s.teacherName || s.teacherLabel || "Unknown";
                  if (!byTeacher[t]) byTeacher[t] = [];
                  byTeacher[t].push(s);
                });
                Object.keys(byTeacher).forEach(t => {
                  byTeacher[t].sort((a, b) => (riskOrder[a.riskStatus] ?? 3) - (riskOrder[b.riskStatus] ?? 3) || a.name.localeCompare(b.name));
                });
                const teacherKeys = Object.keys(byTeacher).sort();

                return (
                  <div style={{ marginBottom: "1.75rem" }}>
                    <h2 style={{ color: "#0f172a", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.25rem", fontFamily: "'Lora', serif" }}>📈 Student Risk Tracking</h2>
                    {!hasPrior ? (
                      <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 8, padding: "0.7rem 1rem", fontSize: "0.82rem", color: "#92400e", marginBottom: "0.75rem" }}>
                        <strong>First assessment in the gradebook — no prior scores available.</strong> Current proficiency is shown below. Risk tracking flags will activate automatically as more assessments are added to the gradebook export.
                      </div>
                    ) : (
                      <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", marginBottom: "0.75rem", fontSize: "0.72rem" }}>
                        {[["PERSISTENTLY_AT_RISK","#dc2626","#fee2e2","Persistently At Risk"],["AT_RISK","#d97706","#fef9c3","At Risk"],["RECOVERING","#7c3aed","#f5f3ff","Recovering"]].map(([k,c,bg,lbl]) => (
                          <span key={k} style={{ background: bg, color: c, borderRadius: 4, padding: "0.15rem 0.5rem", fontWeight: 700 }}>{lbl}</span>
                        ))}
                      </div>
                    )}
                    {teacherKeys.map(teacherKey => {
                      const allStu = byTeacher[teacherKey];
                      const flagged = allStu.filter(s => s.riskStatus !== "OK");
                      return (
                        <div key={teacherKey} style={{ marginBottom: "1.25rem" }}>
                          <div style={{ fontSize: "0.7rem", fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.06em", padding: "0.4rem 0", borderBottom: "1px solid #e2e8f0", marginBottom: "0.5rem" }}>
                            {teacherKey} · {flagged.length} flagged of {allStu.length} students
                          </div>
                          {flagged.length === 0
                            ? <p style={{ fontSize: "0.82rem", color: "#15803d", fontWeight: 600, margin: "0.25rem 0" }}>✓ All students proficient — no flags this assessment.</p>
                            : <div style={{ display: "flex", flexDirection: "column", gap: "0.4rem" }}>
                              {flagged.map(s => {
                                const riskColors = {
                                  "PERSISTENTLY_AT_RISK": { bg: "#fee2e2", border: "#fca5a5", badge: "#dc2626", badgeBg: "#fee2e2", label: "Persistently At Risk" },
                                  "AT_RISK": { bg: "#fef9c3", border: "#fde68a", badge: "#d97706", badgeBg: "#fef9c3", label: "At Risk" },
                                  "RECOVERING": { bg: "#f5f3ff", border: "#ddd6fe", badge: "#7c3aed", badgeBg: "#f5f3ff", label: "Recovering" },
                                  "OK": { bg: "white", border: "#e0e7ff", badge: "#15803d", badgeBg: "#dcfce7", label: "Proficient" },
                                };
                                const rc = riskColors[s.riskStatus] || riskColors["OK"];
                                return (
                                  <div key={s.name} style={{ border: `1px solid ${rc.border}`, borderLeft: `3px solid ${rc.badge}`, borderRadius: 7, padding: "0.6rem 0.85rem", background: rc.bg, display: "flex", alignItems: "center", flexWrap: "wrap", gap: "0.5rem" }}>
                                    <span style={{ fontWeight: 600, color: "#0f172a", fontSize: "0.85rem", flex: "1 1 120px" }}>{s.name}</span>
                                    <span style={{ background: rc.badgeBg, color: rc.badge, borderRadius: 4, padding: "0.1rem 0.45rem", fontSize: "0.68rem", fontWeight: 800 }}>{rc.label}</span>
                                    {s.subgroups.length > 0 && <span style={{ fontSize: "0.7rem", color: "#64748b" }}>{s.subgroups.join(", ")}</span>}
                                    <div style={{ display: "flex", gap: "0.25rem", flexWrap: "wrap", alignItems: "center" }}>
                                      {s.history.map((h, i) => (
                                        <span key={i} style={{ background: h.score >= 70 ? "#dcfce7" : "#fee2e2", color: h.score >= 70 ? "#15803d" : "#dc2626", borderRadius: 3, padding: "0.1rem 0.35rem", fontSize: "0.68rem", fontWeight: 700 }} title={h.assessment}>{h.score}%</span>
                                      ))}
                                      {s.history.length > 0 && <span style={{ color: "#94a3b8", fontSize: "0.65rem" }}>→</span>}
                                      <span style={{ background: s.proficient ? "#dcfce7" : "#fee2e2", color: s.proficient ? "#15803d" : "#dc2626", borderRadius: 3, padding: "0.1rem 0.35rem", fontSize: "0.68rem", fontWeight: 800, outline: "2px solid currentColor", outlineOffset: 1 }}>{s.pct}%</span>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          }
                        </div>
                      );
                    })}
                  </div>
                );
              })()}

              {/* ── SMALL SUBGROUP SPOTLIGHT ── */}
              {growthData && Object.values(growthData.subgroupStats).some(sg => !sg.large) && (() => {
                const smallSgs = Object.values(growthData.subgroupStats).filter(sg => !sg.large);
                const riskOrder = { "PERSISTENTLY_AT_RISK": 0, "AT_RISK": 1, "RECOVERING": 2, "OK": 3 };
                const riskLabels = {
                  "PERSISTENTLY_AT_RISK": { label: "Persistently At Risk", color: "#dc2626", bg: "#fee2e2" },
                  "AT_RISK": { label: "At Risk", color: "#d97706", bg: "#fef9c3" },
                  "RECOVERING": { label: "Recovering", color: "#7c3aed", bg: "#f5f3ff" },
                  "OK": { label: "Proficient", color: "#15803d", bg: "#dcfce7" },
                };
                const teacherKeys = [...new Set(growthData.enriched.map(s => s.teacherName || s.teacherLabel))].sort();
                return (
                  <div style={{ marginBottom: "1.75rem" }}>
                    <h2 style={{ color: "#0f172a", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.25rem", fontFamily: "'Lora', serif" }}>🔦 Small Subgroup Spotlight</h2>
                    <p style={{ fontSize: "0.78rem", color: "#64748b", margin: "0 0 0.75rem", lineHeight: 1.5 }}>
                      These subgroups have 20 or fewer students — too small for reliable group comparisons. Each student is listed individually by teacher. Focus on growth conversation: what's working for students thriving, and what support might help those who are not?
                    </p>
                    {smallSgs.map(sg => {
                      const allRows = [];
                      teacherKeys.forEach(tk => {
                        const members = growthData.enriched.filter(s => (s.teacherName || s.teacherLabel) === tk && s.subgroups.includes(sg.name));
                        if (!members.length) return;
                        const sorted = [...members].sort((a, b) => (riskOrder[a.riskStatus] ?? 3) - (riskOrder[b.riskStatus] ?? 3) || a.name.localeCompare(b.name));
                        sorted.forEach((s, i) => allRows.push({ ...s, teacherKey: tk, firstInTeacher: i === 0, teacherCount: sorted.length }));
                      });
                      if (!allRows.length) return null;
                      const avgPct = Math.round(allRows.reduce((a, s) => a + s.pct, 0) / allRows.length);
                      const profCount2 = allRows.filter(s => s.proficient).length;
                      return (
                        <div key={sg.name} style={{ marginBottom: "1.25rem" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: "0.75rem", marginBottom: "0.5rem" }}>
                            <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.9rem" }}>{sg.name}</div>
                            <div style={{ fontSize: "0.7rem", color: "#64748b" }}>n={allRows.length} · avg {avgPct}% · {profCount2}/{allRows.length} proficient</div>
                          </div>
                          <div style={{ background: "white", borderRadius: 8, overflow: "hidden", border: "1px solid #e2e8f0" }}>
                            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.78rem" }}>
                              <thead>
                                <tr style={{ background: "#f8fafc" }}>
                                  {["Teacher","Student","Status","Score History → Current"].map(h => (
                                    <th key={h} style={{ padding: "0.45rem 0.7rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "2px solid #e2e8f0", fontSize: "0.72rem" }}>{h}</th>
                                  ))}
                                </tr>
                              </thead>
                              <tbody>
                                {allRows.map((s, i) => {
                                  const rl = riskLabels[s.riskStatus] || riskLabels["OK"];
                                  return (
                                    <tr key={i} style={{ borderBottom: "1px solid #f1f5f9", background: i % 2 === 0 ? "white" : "#fafafa" }}>
                                      <td style={{ padding: "0.4rem 0.7rem", fontWeight: 600, color: "#0f766e", verticalAlign: "top" }}>{s.firstInTeacher ? s.teacherKey : ""}</td>
                                      <td style={{ padding: "0.4rem 0.7rem", fontWeight: 500 }}>{s.name}</td>
                                      <td style={{ padding: "0.4rem 0.7rem" }}>
                                        <span style={{ background: rl.bg, color: rl.color, borderRadius: 4, padding: "0.1rem 0.4rem", fontSize: "0.68rem", fontWeight: 800 }}>{rl.label}</span>
                                      </td>
                                      <td style={{ padding: "0.4rem 0.7rem" }}>
                                        <div style={{ display: "flex", gap: "0.25rem", flexWrap: "wrap", alignItems: "center" }}>
                                          {s.history.map((h, j) => (
                                            <span key={j} style={{ background: h.score >= 70 ? "#dcfce7" : "#fee2e2", color: h.score >= 70 ? "#15803d" : "#dc2626", borderRadius: 3, padding: "0.1rem 0.3rem", fontSize: "0.68rem", fontWeight: 700 }} title={h.assessment}>{h.score}%</span>
                                          ))}
                                          {s.history.length > 0 && <span style={{ color: "#94a3b8", fontSize: "0.65rem" }}>→</span>}
                                          <span style={{ background: s.proficient ? "#dcfce7" : "#fee2e2", color: s.proficient ? "#15803d" : "#dc2626", borderRadius: 3, padding: "0.1rem 0.3rem", fontSize: "0.68rem", fontWeight: 800, outline: "2px solid currentColor", outlineOffset: 1 }}>{s.pct}%</span>
                                        </div>
                                      </td>
                                    </tr>
                                  );
                                })}
                              </tbody>
                            </table>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })()}

              {/* ── EXPORT ACTIONS ── */}
              <div className="no-print" style={{ borderTop: "1px solid #e2e8f0", paddingTop: "1.5rem", marginTop: "0.5rem", display: "flex", flexDirection: "column", gap: "1rem" }}>
                {/* PDF Export */}
                <div style={{ background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 10, padding: "1rem 1.25rem" }}>
                  <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.9rem", marginBottom: "0.3rem" }}>⬇ Download PDF Report</div>
                  <p style={{ fontSize: "0.78rem", color: "#475569", margin: "0 0 0.75rem" }}>Captures the full report as a multi-page PDF. May take a few seconds.</p>
                  <button
                    onClick={async () => {
                      const btn = document.querySelector(".pdf-export-btn");
                      if (btn) btn.textContent = "⏳ Generating…";
                      const scrollEl = document.querySelector("[data-scroll]");
                      const rootEl = document.getElementById("root");
                      let prevOverflow, prevHeight, prevRootH;
                      try {
                        if (scrollEl) { prevOverflow = scrollEl.style.overflowY; prevHeight = scrollEl.style.height; scrollEl.style.overflowY = "visible"; scrollEl.style.height = "auto"; }
                        if (rootEl) { prevRootH = rootEl.style.height; rootEl.style.height = "auto"; }
                        document.body.classList.add("printing");
                        await new Promise(r => setTimeout(r, 200));
                        const canvas = await html2canvas(document.body, { scale: 1.5, useCORS: true, backgroundColor: "#f1f5f9" });
                        document.body.classList.remove("printing");
                        const { jsPDF } = window.jspdf;
                        const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "letter" });
                        const margin = 10;
                        const pageW = 215.9 - margin * 2;
                        const pageH = 279.4 - margin * 2;
                        const imgW = canvas.width;
                        const imgH = canvas.height;
                        const scaledW = pageW;
                        const scaledH = (imgH / imgW) * scaledW;
                        const totalPages = Math.ceil(scaledH / pageH);
                        for (let page = 0; page < totalPages; page++) {
                          if (page > 0) pdf.addPage();
                          const srcY = (page * pageH / scaledH) * imgH;
                          const srcH = Math.min((pageH / scaledH) * imgH, imgH - srcY);
                          const pageCanvas = document.createElement("canvas");
                          pageCanvas.width = imgW;
                          pageCanvas.height = srcH;
                          pageCanvas.getContext("2d").drawImage(canvas, 0, srcY, imgW, srcH, 0, 0, imgW, srcH);
                          const pageImg = pageCanvas.toDataURL("image/jpeg", 0.85);
                          const sliceH = (srcH / imgH) * scaledH;
                          pdf.addImage(pageImg, "JPEG", margin, margin, scaledW, sliceH);
                        }
                        pdf.save((currentAssessmentName || "Assessment") + "_Report.pdf");
                      } catch(e) {
                        document.body.classList.remove("printing");
                        alert("PDF generation failed: " + e.message);
                      } finally {
                        if (scrollEl) { scrollEl.style.overflowY = prevOverflow; scrollEl.style.height = prevHeight; }
                        if (rootEl) rootEl.style.height = prevRootH;
                        if (btn) btn.textContent = "⬇ Download PDF";
                      }
                    }}
                    className="pdf-export-btn"
                    style={{ background: "#15803d", color: "white", border: "none", borderRadius: 8, padding: "0.5rem 1.2rem", fontSize: "0.85rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                    ⬇ Download PDF
                  </button>
                </div>

              </div>
            </div>
          );
        })()}


      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
