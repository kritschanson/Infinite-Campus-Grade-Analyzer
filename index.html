<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback, useRef, useEffect } = React;

// ─── Snapshot loader ──────────────────────────────────────────────────────────
// Reads snapshot data from the #snapshot-data div's data attribute (base64-encoded).
// Returns null if this is a fresh (non-snapshot) load.
function loadSnapshot() {
  try {
    const el = document.getElementById("snapshot-data");
    if (!el) return null;
    const b64 = el.getAttribute("content");
    if (!b64) return null;
    return JSON.parse(decodeURIComponent(escape(atob(b64))));
  } catch(e) {
    return null;
  }
}
const SNAPSHOT = loadSnapshot();

// ─── CSV Parsing ──────────────────────────────────────────────────────────────

function parseCSVFull(text) {
  const rows = [];
  let cur = [], cell = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQ && text[i + 1] === '"') { cell += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      cur.push(cell); cell = "";
    } else if ((ch === '\n' || ch === '\r') && !inQ) {
      if (ch === '\r' && text[i + 1] === '\n') i++;
      cur.push(cell); cell = "";
      if (cur.some(c => c.trim())) rows.push(cur);
      cur = [];
    } else {
      cell += ch;
    }
  }
  if (cell || cur.length) { cur.push(cell); if (cur.some(c => c.trim())) rows.push(cur); }
  return rows;
}

// Parse IC Gradebook Export CSV
// Row 0: Assignment Name, [Assess1], [Assess2], ...  (last column = most recent)
// Row 1: Task/Standard Name, Grade, Grade, ...
// Row 2: (blank), [pts1], [pts2], ...
// Row 3+: "LastName, First MI #ID", score1, score2, ...
//
// Returns sections with:
//   currentAssessment  — name of the rightmost assessment
//   students[].history — all prior assessments as [{ assessment, score }]
//   students[].pct     — score % on the current (most recent) assessment
function parseICGradebook(rows, teacherLabel, teacherName) {
  if (rows.length < 4) return null;

  // Build validCols: each column that has a non-blank name AND a valid points-possible
  const rawNames = rows[0].slice(1);
  const rawPossible = rows[2].slice(1);
  const validCols = [];
  rawNames.forEach((n, i) => {
    const name = n.trim();
    const possible = parseFloat((rawPossible[i] || "").trim());
    if (name && !isNaN(possible) && possible > 0) {
      validCols.push({ name, possible, colIndex: i + 1 });
    }
  });

  if (validCols.length === 0) return null;

  // Most recent = last valid column
  const currentCol = validCols[validCols.length - 1];
  const historyCols = validCols.slice(0, -1);

  const students = [];
  for (let r = 3; r < rows.length; r++) {
    const row = rows[r];
    const raw = (row[0] || "").trim();
    if (!raw) continue;

    // Parse "LastName, FirstName MI #StudentID"
    const idMatch = raw.match(/#(\d+)/);
    const studentId = idMatch ? idMatch[1] : "";
    const namePart = raw.replace(/#\d+/, "").trim().replace(/,\s*$/, "").trim();

    // Convert "Last, First MI" → "First MI Last"
    const commaIdx = namePart.indexOf(",");
    let name;
    if (commaIdx !== -1) {
      const last = namePart.slice(0, commaIdx).trim();
      const first = namePart.slice(commaIdx + 1).trim();
      name = first ? `${first} ${last}` : last;
    } else {
      name = namePart;
    }

    // Current score → pct
    const rawScore = parseFloat((row[currentCol.colIndex] || "").trim());
    const pct = isNaN(rawScore) ? null : Math.round((rawScore / currentCol.possible) * 100);

    // Prior scores → history array (in order, oldest first)
    const history = historyCols.map(col => {
      const val = parseFloat((row[col.colIndex] || "").trim());
      if (isNaN(val)) return null;
      return { assessment: col.name, score: Math.round((val / col.possible) * 100) };
    }).filter(Boolean);

    students.push({ name, studentId, pct, history });
  }

  return {
    teacherLabel,
    teacherName: teacherName || teacherLabel,
    students,
    validCols,
    currentAssessment: currentCol.name,
    historyCols,
  };
}

// Parse subgroup CSV — new format:
// Col 0: Student Name
// Col 1: Student ID (with or without # prefix)
// Col 2+: Category columns (e.g. "Program", "Language") where cell value = subgroup label
//         Any non-blank cell value = student belongs to that subgroup with that label
//         e.g. row: "Ahmed, Aseel, 888206511, IEP, ELL" → subgroups: ["IEP", "ELL"]
// Parse IC subgroup CSV.
// Expected format (IC export):
//   Col 0 "Student"  — "LastName, First MI #StudentID"  (same format as gradebook)
//   Col 1 "Sub Group" — subgroup label e.g. "IEP", "ELL"
// One row per membership; a student in two subgroups appears on two rows.
//
// Also handles a wide column-per-subgroup format as a fallback:
//   Col 0: name/combined, Col 1: ID, Col 2+: subgroup category columns
function parseSubgroupCSV(rows) {
  if (!rows.length) return {};
  const headers = rows[0].map(h => h.trim());

  // Helper: parse an IC-style combined student cell "Last, First MI #ID"
  const parseStudentCell = (raw) => {
    const idMatch = raw.match(/#(\d+)/);
    const studentId = idMatch ? idMatch[1] : "";
    const namePart = raw.replace(/#\d+/, "").trim().replace(/,\s*$/, "").trim();
    const ci = namePart.indexOf(",");
    let name;
    if (ci !== -1) {
      const last  = namePart.slice(0, ci).trim();
      const first = namePart.slice(ci + 1).trim();
      name = first ? `${first} ${last}` : last;
    } else {
      name = namePart;
    }
    return { name, studentId };
  };

  // Detect format:
  // IC format: header col 0 matches "student", col 1 matches "sub group"
  const h0 = headers[0] || "";
  const h1 = headers[1] || "";
  const isICFormat = /^student$/i.test(h0) && /sub\s*group/i.test(h1);

  const map = {};

  if (isICFormat) {
    // One row per membership — col 0 = combined student cell, col 1 = subgroup label
    rows.slice(1).forEach(row => {
      const raw = (row[0] || "").trim();
      const sg  = (row[1] || "").trim();
      if (!raw || !sg) return;
      const { name, studentId } = parseStudentCell(raw);
      const key = studentId || name;
      if (!map[key]) map[key] = { name, id: studentId, subgroups: [] };
      if (!map[key].subgroups.includes(sg)) map[key].subgroups.push(sg);
    });
    return map;
  }

  // Fallback: wide format — separate name/ID columns + subgroup value columns
  const nameIdx = (() => {
    const i = headers.findIndex(h => /student\s*name|^name$|^student$/i.test(h));
    return i !== -1 ? i : 0;
  })();
  const idIdx = (() => {
    const i = headers.findIndex(h => /student\s*id|^id$|^#/i.test(h));
    return i !== -1 ? i : -1;
  })();
  const sgColIdxs = headers.map((_, i) => i).filter(i => i !== nameIdx && i !== idIdx);

  rows.slice(1).forEach(row => {
    const rawCell = (row[nameIdx] || "").trim();
    if (!rawCell) return;
    // If the cell contains a # it's likely an IC combined cell
    let name, studentId;
    if (rawCell.includes("#")) {
      ({ name, studentId } = parseStudentCell(rawCell));
    } else {
      name = rawCell;
      studentId = idIdx !== -1 ? (row[idIdx] || "").trim().replace(/^#/, "") : "";
    }
    const subgroups = sgColIdxs.map(i => (row[i] || "").trim()).filter(Boolean);
    const key = studentId || name;
    if (!map[key]) map[key] = { name, id: studentId, subgroups: [] };
    subgroups.forEach(sg => {
      if (!map[key].subgroups.includes(sg)) map[key].subgroups.push(sg);
    });
  });
  return map;
}

// Parse prior analytics CSV.
// Columns: StudentID, StudentName, Subgroups,
//   then per assessment: AssessName|Date, AssessName|Score, AssessName|Reassessed (optional)
// |Reassessed stores the original pre-reassessment score; blank if no reassessment occurred.
function parsePriorAnalyticsCSV(rows) {
  if (!rows.length) return {};
  const headers = rows[0].map(h => h.trim());
  const fixedCols = 3;

  // Detect assessments — columns after the fixed 3 come in groups of 2 or 3:
  //   AssessName|Date, AssessName|Score, [AssessName|Reassessed]
  const assessments = [];
  let i = fixedCols;
  while (i < headers.length) {
    const h = headers[i];
    if (h.endsWith("|Date")) {
      const name = h.replace(/\|Date$/, "").trim();
      const scoreIdx = i + 1 < headers.length && headers[i + 1] === name + "|Score" ? i + 1 : -1;
      const reassessIdx = i + 2 < headers.length && headers[i + 2] === name + "|Reassessed" ? i + 2 : -1;
      assessments.push({ name, dateColIdx: i, scoreColIdx: scoreIdx, reassessColIdx: reassessIdx });
      i += reassessIdx !== -1 ? 3 : 2;
    } else {
      i++;
    }
  }

  const map = {};
  rows.slice(1).forEach(row => {
    const id = (row[0] || "").trim();
    const name = (row[1] || "").trim();
    if (!id && !name) return;
    const key = id || name;
    const subgroups = (row[2] || "").split(";").map(s => s.trim()).filter(Boolean);
    const history = [];
    assessments.forEach(a => {
      const date = (row[a.dateColIdx] || "").trim();
      const score = a.scoreColIdx !== -1 ? parseFloat(row[a.scoreColIdx]) : NaN;
      // Accept entries with a score even if the date is blank —
      // prior assessments in the analytics CSV often have no date recorded
      if (isNaN(score)) return;
      const reassessedRaw = a.reassessColIdx !== -1 ? (row[a.reassessColIdx] || "").trim() : "";
      const originalScore = reassessedRaw !== "" ? parseFloat(reassessedRaw) : null;
      history.push({ assessment: a.name, date, score, originalScore });
    });
    map[key] = { name, id, subgroups, history };
  });
  return map;
}

// ─── Stats Helpers ────────────────────────────────────────────────────────────

function computeStats(scores) {
  const valid = scores.filter(s => s !== null && !isNaN(s));
  if (!valid.length) return { mean: 0, median: 0, high: 0, low: 0, stdDev: 0 };
  const mean = valid.reduce((a, b) => a + b, 0) / valid.length;
  const sorted = [...valid].sort((a, b) => a - b);
  const mid = Math.floor(sorted.length / 2);
  const median = sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
  const variance = valid.reduce((a, b) => a + (b - mean) ** 2, 0) / valid.length;
  const stdDev = Math.sqrt(variance);
  return {
    mean: Math.round(mean * 10) / 10,
    median: Math.round(median * 10) / 10,
    high: Math.max(...valid),
    low: Math.min(...valid),
    stdDev: Math.round(stdDev * 10) / 10
  };
}

function gradeDist(pcts) {
  return {
    A: pcts.filter(p => p >= 90).length,
    B: pcts.filter(p => p >= 80 && p < 90).length,
    C: pcts.filter(p => p >= 70 && p < 80).length,
    D: pcts.filter(p => p >= 60 && p < 70).length,
    F: pcts.filter(p => p < 60).length,
  };
}

// ─── Growth & Risk Logic ──────────────────────────────────────────────────────

// History comes from two sources (merged, de-duped by assessment name):
//   1. In-file prior columns (students[].history built during CSV parse) — primary
//   2. priorMap (uploaded Analytics CSV) — supplementary for cross-trimester scores
//      that predate what's in the current gradebook file
//
// assessmentName = the current (most recent) assessment being analyzed

function buildGrowthData(sections, assessmentName, subgroupMap, priorMap) {
  // Collect all students with their current pct and in-file history
  const allStudents = [];
  sections.forEach(sec => {
    sec.students.forEach(stu => {
      if (stu.pct === null) return;
      allStudents.push({ ...stu, teacherLabel: sec.teacherLabel, teacherName: sec.teacherName || sec.teacherLabel });
    });
  });

  const totalStudents = allStudents.length;
  const classAvg = totalStudents > 0
    ? Math.round(allStudents.reduce((a, s) => a + s.pct, 0) / totalStudents)
    : 0;

  const getSubgroupInfo = (stu) => {
    if (!subgroupMap) return null;
    if (stu.studentId && subgroupMap[stu.studentId]) return subgroupMap[stu.studentId];
    if (subgroupMap[stu.name]) return subgroupMap[stu.name];
    return Object.values(subgroupMap).find(v => v.id === stu.studentId || v.name === stu.name) || null;
  };

  const getPriorInfo = (stu) => {
    if (!priorMap) return null;
    if (stu.studentId && priorMap[stu.studentId]) return priorMap[stu.studentId];
    if (priorMap[stu.name]) return priorMap[stu.name];
    return Object.values(priorMap).find(v => v.id === stu.studentId || v.name === stu.name) || null;
  };

  // Derive risk status by replaying the full score sequence oldest → newest.
  //
  // Step-down chain when a student scores proficient after struggling:
  //   PERSISTENTLY_AT_RISK → proficient → AT_RISK
  //   AT_RISK              → proficient → RECOVERING
  //   RECOVERING           → proficient → OK (cleared)
  //
  // Short-circuit: two consecutive proficient scores always clears immediately,
  // regardless of prior status (e.g. F F F P P → OK, not Recovering).
  const computeRiskStatus = (allScores) => {
    // allScores: array of % values oldest → newest (includes current as last entry)
    if (allScores.length === 0) return "OK";

    // Replay the sequence, updating status at each step
    let status = "OK";
    for (let i = 0; i < allScores.length; i++) {
      const prof = allScores[i] >= 70;
      if (!prof) {
        // Not proficient: escalate or hold at risk level
        if (status === "PERSISTENTLY_AT_RISK" || status === "AT_RISK") {
          status = "PERSISTENTLY_AT_RISK";
        } else {
          status = "AT_RISK";
        }
      } else {
        // Proficient: two consecutive proficient scores always clears
        const prevProf = i > 0 && allScores[i - 1] >= 70;
        if (prevProf) {
          status = "OK";
        } else {
          // One proficient score: step down one level
          if (status === "PERSISTENTLY_AT_RISK") status = "AT_RISK";
          else if (status === "AT_RISK") status = "RECOVERING";
          else if (status === "RECOVERING") status = "OK";
          // else already OK, stays OK
        }
      }
    }
    return status;
  };

  const enriched = allStudents.map(stu => {
    const sg = getSubgroupInfo(stu);
    const pr = getPriorInfo(stu);

    // Subgroups: from subgroup CSV, fall back to analytics CSV
    const subgroups = sg ? sg.subgroups : (pr ? pr.subgroups : []);

    // Build merged history:
    // Start with any cross-trimester history from the analytics CSV that isn't
    // already covered by the in-file columns OR the current assessment.
    // Must exclude the current assessment from crossTermHistory — otherwise the
    // analytics CSV's stored score for the current assessment would appear as an
    // extra history entry before the new IC score.
    const inFileNames = new Set([
      ...stu.history.map(h => h.assessment),
      assessmentName,  // exclude current assessment from cross-term history
    ]);
    const crossTermHistory = pr
      ? pr.history.filter(h => !inFileNames.has(h.assessment))
      : [];

    // Full ordered history: cross-term (oldest) + in-file (newest prior columns)
    const history = [...crossTermHistory, ...stu.history];

    // ── Reassessment detection ──────────────────────────────────────────────
    // Compare EVERY column in the current IC file against the score stored in
    // the prior Analytics CSV for that same assessment name.
    // Score went up → reassessment occurred on that assessment.
    // Returns an array so a student who reassessed on multiple tests is fully captured.
    const reassessedAssessments = []; // [{ assessment, originalPct, newPct, crossedProficiency }]

    if (pr) {
      // Check all history columns (prior assessments in this IC file)
      stu.history.forEach(h => {
        const priorEntry = pr.history.find(p => p.assessment === h.assessment);
        if (priorEntry && h.score > priorEntry.score) {
          reassessedAssessments.push({
            assessment: h.assessment,
            originalPct: priorEntry.score,
            newPct: h.score,
            crossedProficiency: priorEntry.score < 70 && h.score >= 70,
          });
        }
      });
      // Check current (most recent) assessment
      const priorCurrent = pr.history.find(p => p.assessment === assessmentName);
      if (priorCurrent && stu.pct > priorCurrent.score) {
        reassessedAssessments.push({
          assessment: assessmentName,
          originalPct: priorCurrent.score,
          newPct: stu.pct,
          crossedProficiency: priorCurrent.score < 70 && stu.pct >= 70,
        });
      }
    }

    // For backward compat with proficiency display — did any reassessment on the
    // current assessment cross into proficiency?
    const currentReassess = reassessedAssessments.find(r => r.assessment === assessmentName);
    const reassessedFrom = currentReassess ? currentReassess.originalPct : null;
    const crossedProficiency = currentReassess ? currentReassess.crossedProficiency : false;

    const currentEntry = { assessment: assessmentName, score: stu.pct, originalScore: reassessedFrom };
    const proficient = stu.pct >= 70;

    // Build the full score sequence (history scores + current) for risk calculation
    const allScores = [...history.map(h => h.score), stu.pct];
    const riskStatus = computeRiskStatus(allScores);

    return { ...stu, subgroups, history, currentEntry, riskStatus, proficient,
             reassessedFrom, crossedProficiency, reassessedAssessments };
  });

  // ── Subgroup stats ────────────────────────────────────────────────────────
  const subgroupStats = {};
  if (subgroupMap || priorMap) {
    const allSgs = new Set();
    enriched.forEach(s => s.subgroups.forEach(sg => allSgs.add(sg)));
    allSgs.forEach(sgName => {
      const members = enriched.filter(s => s.subgroups.includes(sgName));
      if (!members.length) return;
      const avg = Math.round(members.reduce((a, s) => a + s.pct, 0) / members.length);
      const gap = avg - classAvg;
      const flagged = gap < -10;

      let priorAvg = null;
      const withHist = members.filter(s => s.history.length > 0);
      if (withHist.length > 0) {
        const lastScores = withHist.map(s => s.history[s.history.length - 1].score);
        priorAvg = Math.round(lastScores.reduce((a, b) => a + b, 0) / lastScores.length);
      }
      let priorClassAvg = null;
      const allWithHist = enriched.filter(s => s.history.length > 0);
      if (allWithHist.length > 0) {
        const last = allWithHist.map(s => s.history[s.history.length - 1].score);
        priorClassAvg = Math.round(last.reduce((a, b) => a + b, 0) / last.length);
      }
      let trend = null;
      if (priorAvg !== null && priorClassAvg !== null) {
        const priorGap = priorAvg - priorClassAvg;
        if (gap > priorGap + 2) trend = "closing";
        else if (gap < priorGap - 2) trend = "widening";
        else trend = "holding";
      }
      subgroupStats[sgName] = { name: sgName, count: members.length, avg, gap, flagged, trend, priorAvg, large: members.length > 20 };
    });
  }

  // ── Reassessment list ────────────────────────────────────────────────────
  // One row per student who reassessed on at least one assessment.
  // Each entry includes all the assessments they reassessed on, sorted by
  // their lowest original score (most struggling students first within each grade band).
  // Top-level sort: by original score on the LOWEST-scoring reassessed assessment desc
  // so the table groups A→B→C→D→F reassessors naturally.
  const reassessments = enriched
    .filter(s => s.reassessedAssessments.length > 0)
    .sort((a, b) => {
      // Sort by the highest original score among their reassessed assessments (desc)
      // so students who were already proficient sort first, then C, D, F
      const aMax = Math.max(...a.reassessedAssessments.map(r => r.originalPct));
      const bMax = Math.max(...b.reassessedAssessments.map(r => r.originalPct));
      return bMax - aMax;
    });

  // ── Analytics CSV export ────────────────────────────────────────────────────
  const buildAnalyticsCSV = () => {
    // Collect all unique assessment names in chronological order
    const allAssessmentNames = [];
    const seen = new Set();
    enriched.forEach(s => {
      s.history.forEach(h => {
        if (!seen.has(h.assessment)) { seen.add(h.assessment); allAssessmentNames.push(h.assessment); }
      });
    });
    if (!seen.has(assessmentName)) allAssessmentNames.push(assessmentName);

    const headerRow = ["StudentID", "StudentName", "Subgroups",
      ...allAssessmentNames.flatMap(a => [`${a}|Date`, `${a}|Score`, `${a}|Reassessed`])];
    const today = new Date().toISOString().split("T")[0];

    const dataRows = enriched.map(s => {
      const subStr = s.subgroups.join(";");
      const assessCols = allAssessmentNames.flatMap(a => {
        if (a === assessmentName) {
          // Current assessment: store original score in |Reassessed if it changed
          const r = s.reassessedAssessments.find(r => r.assessment === a);
          return [today, s.pct.toString(), r ? r.originalPct.toString() : ""];
        }
        // Prior assessment: get from history, carry forward any reassessment original
        const h = s.history.find(h => h.assessment === a);
        if (!h) return ["", "", ""];
        // Check if this assessment was reassessed in this session
        const r = s.reassessedAssessments.find(r => r.assessment === a);
        // If reassessed this session, store original in |Reassessed
        // If it was previously reassessed (in Analytics CSV), carry that forward via h.originalScore
        const originalScore = r
          ? r.originalPct.toString()
          : (h.originalScore !== null && h.originalScore !== undefined ? h.originalScore.toString() : "");
        return [(h.date || ""), h.score.toString(), originalScore];
      });
      return [s.studentId || "", s.name, subStr, ...assessCols];
    });

    const escape = (v) => {
      const sv = String(v);
      return sv.includes(",") || sv.includes('"') || sv.includes("\n") ? `"${sv.replace(/"/g, '""')}"` : sv;
    };
    return [headerRow, ...dataRows].map(row => row.map(escape).join(",")).join("\n");
  };

  return { enriched, subgroupStats, classAvg, totalStudents, reassessments, buildAnalyticsCSV };
}

// ─── Teacher Breakdown Card ──────────────────────────────────────────────────

// ─── Main App ─────────────────────────────────────────────────────────────────

function App() {
  const isSnapshot = !!SNAPSHOT;

  const [sections, setSections] = useState(SNAPSHOT?.sections ?? []);
  const [subgroupMap, setSubgroupMap] = useState(SNAPSHOT?.subgroupMap ?? null);
  const [priorMap, setPriorMap] = useState(SNAPSHOT?.priorMap ?? null);
  const [activeTab, setActiveTab] = useState(SNAPSHOT ? "analysis" : "upload");
  const [report, setReport] = useState(SNAPSHOT?.report ?? null);
  const [growthData, setGrowthData] = useState(SNAPSHOT?.growthData ?? null);
  const [error, setError] = useState("");
  const [dragOver, setDragOver] = useState(false);

  const [studentTableOpen, setStudentTableOpen] = useState(true);

  // Derive the assessment name to analyze: the currentAssessment from the first loaded section
  const currentAssessmentName = sections.length > 0 ? sections[0].currentAssessment : "";

  const processFiles = useCallback((files) => {
    setError("");
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const text = e.target.result;
          const rows = parseCSVFull(text);
          if (!rows.length) return;

          const name = file.name.replace(/\.csv$/i, "").trim();
          const lname = name.toLowerCase();

          // Subgroup file
          if (lname.includes("subgroup")) {
            // Merge into existing subgroup map so multiple teacher CSVs accumulate
            const newEntries = parseSubgroupCSV(rows);
            setSubgroupMap(prev => {
              if (!prev) return newEntries;
              const merged = { ...prev };
              Object.entries(newEntries).forEach(([key, val]) => {
                if (!merged[key]) {
                  merged[key] = val;
                } else {
                  // Merge subgroups for students that appear in multiple files
                  val.subgroups.forEach(sg => {
                    if (!merged[key].subgroups.includes(sg)) merged[key].subgroups.push(sg);
                  });
                }
              });
              return merged;
            });
            return;
          }
          // Prior analytics (optional, cross-trimester only)
          if (lname.includes("analytics") || lname.includes("prior")) {
            setPriorMap(parsePriorAnalyticsCSV(rows));
            return;
          }

          // Detect IC gradebook by checking row 0 col 0
          const firstCell = (rows[0]?.[0] || "").trim().toLowerCase();
          if (firstCell === "assignment name") {
            const teacherLabel = name;
            // Extract base teacher name by stripping trailing period/section patterns
            // e.g. "Smith Period 1" -> "Smith", "Jones P2" -> "Jones", "Garcia 3" -> "Garcia"
            const teacherName = name
              .replace(/[\s\-\u2013_]+(?:period|per|pd|section|sec|p)[\s\-\u2013_]*\d+\s*$/i, "")
              .replace(/[\s\-\u2013_]+\d+\s*$/, "")
              .trim() || name;
            const parsed = parseICGradebook(rows, teacherLabel, teacherName);
            if (!parsed || parsed.students.length === 0) {
              setError(`Could not parse "${file.name}" — no student data found.`);
              return;
            }
            setSections(prev => {
              const filtered = prev.filter(s => s.teacherLabel !== teacherLabel);
              return [...filtered, parsed];
            });
            return;
          }

          setError(`"${file.name}" doesn't look like an IC Gradebook, Subgroup, or Analytics CSV.`);
        } catch (err) {
          setError("Error reading file: " + err.message);
        }
      };
      reader.readAsText(file);
    });
  }, []);

  const onDrop = useCallback((e) => {
    e.preventDefault();
    setDragOver(false);
    processFiles(e.dataTransfer.files);
  }, [processFiles]);

  const removeSection = (label) => {
    setSections(prev => prev.filter(s => s.teacherLabel !== label));
  };

  const generateReport = () => {
    if (!sections.length) { setError("No gradebook files loaded."); return; }

    // Compute combined stats using each section's built-in current pct
    const allPcts = sections.flatMap(sec => sec.students.map(s => s.pct).filter(v => v !== null));

    const stats = computeStats(allPcts);
    const dist = gradeDist(allPcts);
    const proficient = allPcts.filter(p => p >= 70).length;
    const notProficient = allPcts.length - proficient;
    const proficiencyPct = allPcts.length > 0 ? Math.round((proficient / allPcts.length) * 100) : 0;

    const gd = buildGrowthData(sections, currentAssessmentName, subgroupMap, priorMap);
    // Count students whose score changed (reassessed) and who crossed into proficiency via reassessment
    const reassessedCount = gd.reassessments.length;
    // Count how many individual assessment instances crossed into proficiency
    const reassessedToProfCount = gd.reassessments
      .flatMap(s => s.reassessedAssessments)
      .filter(r => r.crossedProficiency).length;

    setReport({ stats, dist, proficient, notProficient, proficiencyPct, totalStudents: allPcts.length, reassessedCount, reassessedToProfCount });
    setGrowthData(gd);
    setActiveTab("analysis");
  };

  const GRADE_COLORS = { A:"#15803d", B:"#65a30d", C:"#d97706", D:"#ea580c", F:"#dc2626" };
  const GRADE_BGS = { A:"#dcfce7", B:"#f0fdf4", C:"#fef9c3", D:"#fff7ed", F:"#fee2e2" };

  const downloadSnapshot = () => {
    try {
      const state = {
        sections, subgroupMap, priorMap, report,
        growthData: growthData ? {
          enriched:      growthData.enriched,
          subgroupStats: growthData.subgroupStats,
          classAvg:      growthData.classAvg,
          totalStudents: growthData.totalStudents,
          reassessments: growthData.reassessments,
        } : null,
      };

      // Base64-encode so the JSON is safe in any HTML attribute
      const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(state))));

      // Read the app source from the embedded __APP_SOURCE__ variable
      // (a verbatim copy of the file baked in at the bottom of the HTML).
      // Falls back to outerHTML only if the source var isn't available.
      const html = (typeof __APP_SOURCE__ !== "undefined")
        ? __APP_SOURCE__
        : document.documentElement.outerHTML;

      const emptyMeta  = '<meta id="snapshot-data" name="snapshot-data" content="">';
      const filledMeta = '<meta id="snapshot-data" name="snapshot-data" content="' + b64 + '">';
      const snapshot   = html.replace(emptyMeta, filledMeta);

      const blob = new Blob([snapshot], { type: "text/html;charset=utf-8;" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = (currentAssessmentName || "Assessment") + "_Report.html";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch(e) {
      alert("Snapshot failed: " + e.message);
    }
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh", background: "#f1f5f9" }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%)", padding: "0.9rem 1.5rem", flexShrink: 0 }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
          <div style={{ width: 36, height: 36, background: "rgba(20,184,166,0.25)", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1.1rem" }}>📊</div>
          <div>
            <div style={{ fontFamily: "'Lora', serif", fontWeight: 700, color: "white", fontSize: "1.05rem", letterSpacing: "0.01em" }}>IC Grade Analyzer</div>
            <div style={{ fontSize: "0.68rem", color: "#94a3b8", letterSpacing: "0.04em", textTransform: "uppercase" }}>Infinite Campus · PLC Report Tool</div>
          </div>
        </div>
        {/* Assessment selector */}
        {currentAssessmentName && (
          <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
            <span style={{ fontSize: "0.68rem", color: "#64748b", textTransform: "uppercase", letterSpacing: "0.05em" }}>Analyzing:</span>
            <span style={{ background: "rgba(20,184,166,0.2)", color: "#5eead4", borderRadius: 6, padding: "0.25rem 0.65rem", fontSize: "0.8rem", fontWeight: 700 }}>{currentAssessmentName}</span>
          </div>
        )}
        </div>
      </div>

      {/* Tabs */}
      <div className="no-print" style={{ background: "white", borderBottom: "1px solid #e2e8f0", flexShrink: 0 }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", display: "flex", padding: "0 1.5rem" }}>
        {[["upload","📁 Upload"],["data","📋 Data"],["analysis","📈 Analysis"]].map(([key, label]) => (
          <button key={key} onClick={() => setActiveTab(key)}
            style={{ background: "none", border: "none", borderBottom: activeTab === key ? "3px solid #0f766e" : "3px solid transparent", color: activeTab === key ? "#0f766e" : "#64748b", fontFamily: "inherit", fontWeight: 700, fontSize: "0.82rem", padding: "0.75rem 1.1rem", cursor: "pointer", transition: "all 0.15s" }}>
            {label} {key === "data" && sections.length > 0 && <span style={{ background: "#f0fdfa", color: "#0f766e", borderRadius: 20, padding: "0.05rem 0.4rem", fontSize: "0.68rem", marginLeft: "0.2rem", fontWeight: 800 }}>{sections.length}</span>}
          </button>
        ))}
        </div>
      </div>

      {/* Main Content */}
      <div style={{ flex: 1, overflowY: "auto" }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", padding: "1.25rem 1.5rem" }}>

        {error && (
          <div className="no-print" style={{ background: "#fef2f2", border: "1px solid #fca5a5", borderRadius: 8, padding: "0.6rem 1rem", marginBottom: "1rem", color: "#dc2626", fontSize: "0.82rem", fontWeight: 600 }}>
            ⚠️ {error} <button onClick={() => setError("")} style={{ background: "none", border: "none", color: "#dc2626", cursor: "pointer", marginLeft: "0.5rem", fontWeight: 700 }}>✕</button>
          </div>
        )}

        {/* ── UPLOAD TAB ── */}
        {activeTab === "upload" && (
          <div>
            {/* Snapshot notice */}
            {isSnapshot && (
              <div style={{ background: "#f0fdfa", border: "1px solid #99f6e4", borderRadius: 10, padding: "1rem 1.25rem", marginBottom: "1.25rem", display: "flex", alignItems: "center", gap: "1rem" }}>
                <div style={{ fontSize: "1.5rem" }}>📸</div>
                <div>
                  <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.9rem", marginBottom: "0.15rem" }}>This is a saved snapshot</div>
                  <div style={{ fontSize: "0.78rem", color: "#475569" }}>
                    Data is embedded in this file. The Analysis and Data tabs are fully interactive. To analyze new data, open the original IC Grade Analyzer and upload fresh files.

                <button onClick={() => setActiveTab("analysis")}
                  style={{ marginLeft: "auto", background: "linear-gradient(135deg, #0f766e, #0d9488)", color: "white", border: "none", borderRadius: 8, padding: "0.5rem 1.1rem", fontSize: "0.82rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap" }}>

          return (
            <div className="tab-analysis">

              <div style={{ background: "linear-gradient(135deg, #0f172a, #1e3a5f)", borderRadius: 12, padding: "1.25rem 1.5rem", marginBottom: "1.5rem", color: "white" }}>
                <div style={{ fontFamily: "'Lora', serif", fontSize: "1.2rem", fontWeight: 700, marginBottom: "0.2rem" }}>{currentAssessmentName}</div>
                <div style={{ fontSize: "0.75rem", color: "#94a3b8" }}>{[...new Set(sections.map(s => s.teacherName || s.teacherLabel))].join(" · ")} · {totalStudents} students · {sections.length} section{sections.length !== 1 ? "s" : ""}</div>

                    ["Median", stats.median + "%", "#0f766e"],

                    <div style={{ display: "flex", alignItems: "baseline", gap: "0.5rem" }}>
                      <span style={{ fontWeight: 800, fontSize: "1.1rem", color: proficiencyPct >= 70 ? "#15803d" : "#dc2626" }}>{proficiencyPct}%</span>

                          const pct = Math.round((count / total) * 100);

                          return (
                            <div key={g} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "0.1rem", minWidth: 20 }}>

                          const allPcts = teacherSections.flatMap(sec => sec.students.map(s => s.pct).filter(v => v !== null));
                          const tStats = computeStats(allPcts);
                          const tProf = allPcts.filter(p => p >= 70).length;
                          const tProfPct = allPcts.length > 0 ? Math.round((tProf / allPcts.length) * 100) : 0;
                          const profDiff = tProfPct - proficiencyPct;
                          const hasMultiplePeriods = teacherSections.length > 1;

                          return (
                            <TeacherBreakdownCard
                              key={tName}
                              tName={tName}

                              tStats={tStats}
                              tProfPct={tProfPct}
                              profDiff={profDiff}
                              hasMultiplePeriods={hasMultiplePeriods}

                              proficiencyPct={proficiencyPct}

                      return (
                        <div key={sg.name} style={{ border: `1px solid ${sg.flagged ? "#fca5a5" : "#e2e8f0"}`, borderLeft: `4px solid ${gapColor}`, borderRadius: 8, padding: "0.75rem 1rem", background: sg.flagged ? "#fef2f2" : "white" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "0.5rem" }}>

                          <div style={{ fontSize: "0.65rem", color: "#94a3b8", marginTop: "0.3rem" }}>Class avg: {growthData.classAvg}%</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* ── STUDENT RISK TRACKING ── */}
              {growthData && (() => {
                const riskOrder = { "PERSISTENTLY_AT_RISK": 0, "AT_RISK": 1, "RECOVERING": 2, "OK": 3 };
                const byTeacher = {};
                growthData.enriched.forEach(s => {
                  const t = s.teacherName || s.teacherLabel || "Unknown";
                  if (!byTeacher[t]) byTeacher[t] = [];
                  byTeacher[t].push(s);
                });
                Object.keys(byTeacher).forEach(t => {
                  byTeacher[t].sort((a, b) => (riskOrder[a.riskStatus] ?? 3) - (riskOrder[b.riskStatus] ?? 3) || a.name.localeCompare(b.name));
                });
                const teacherKeys = Object.keys(byTeacher).sort();

                return (
                  <div style={{ marginBottom: "1.75rem" }}>
                    <h2 style={{ color: "#0f172a", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.25rem", fontFamily: "'Lora', serif" }}>📈 Student Risk Tracking</h2>
                    {!hasPrior ? (
                      <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 8, padding: "0.7rem 1rem", fontSize: "0.82rem", color: "#92400e", marginBottom: "0.75rem" }}>
                        <strong>First assessment in the gradebook — no prior scores available.</strong> Current proficiency is shown below. Risk tracking flags will activate automatically as more assessments are added to the gradebook export.
                      </div>
                    ) : (
                      <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", marginBottom: "0.75rem", fontSize: "0.72rem" }}>
                        {[["PERSISTENTLY_AT_RISK","#dc2626","#fee2e2","Persistently At Risk"],["AT_RISK","#d97706","#fef9c3","At Risk"],["RECOVERING","#7c3aed","#f5f3ff","Recovering"]].map(([k,c,bg,lbl]) => (
                          <span key={k} style={{ background: bg, color: c, borderRadius: 4, padding: "0.15rem 0.5rem", fontWeight: 700 }}>{lbl}</span>
                        ))}
                      </div>
                    )}
                    {teacherKeys.map(teacherKey => {
                      const allStu = byTeacher[teacherKey];
                      const flagged = allStu.filter(s => s.riskStatus !== "OK");
                      return (
                        <div key={teacherKey} style={{ marginBottom: "1.25rem" }}>
                          <div style={{ fontSize: "0.7rem", fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.06em", padding: "0.4rem 0", borderBottom: "1px solid #e2e8f0", marginBottom: "0.5rem" }}>
                            {teacherKey} · {flagged.length} flagged of {allStu.length} students
                          </div>
                          {flagged.length === 0
                            ? <p style={{ fontSize: "0.82rem", color: "#15803d", fontWeight: 600, margin: "0.25rem 0" }}>✓ All students proficient — no flags this assessment.</p>
                            : <div style={{ display: "flex", flexDirection: "column", gap: "0.4rem" }}>
                              {flagged.map(s => {
                                const riskColors = {
                                  "PERSISTENTLY_AT_RISK": { bg: "#fee2e2", border: "#fca5a5", badge: "#dc2626", badgeBg: "#fee2e2", label: "Persistently At Risk" },
                                  "AT_RISK": { bg: "#fef9c3", border: "#fde68a", badge: "#d97706", badgeBg: "#fef9c3", label: "At Risk" },
                                  "RECOVERING": { bg: "#f5f3ff", border: "#ddd6fe", badge: "#7c3aed", badgeBg: "#f5f3ff", label: "Recovering" },
                                  "OK": { bg: "white", border: "#e0e7ff", badge: "#15803d", badgeBg: "#dcfce7", label: "Proficient" },
                                };
                                const rc = riskColors[s.riskStatus] || riskColors["OK"];
                                return (
                                  <div key={s.name} style={{ border: `1px solid ${rc.border}`, borderLeft: `3px solid ${rc.badge}`, borderRadius: 7, padding: "0.6rem 0.85rem", background: rc.bg, display: "flex", alignItems: "center", flexWrap: "wrap", gap: "0.5rem" }}>
                                    <span style={{ fontWeight: 600, color: "#0f172a", fontSize: "0.85rem", flex: "1 1 120px" }}>{s.name}</span>
                                    <span style={{ background: rc.badgeBg, color: rc.badge, borderRadius: 4, padding: "0.1rem 0.45rem", fontSize: "0.68rem", fontWeight: 800 }}>{rc.label}</span>
                                    {s.subgroups.length > 0 && <span style={{ fontSize: "0.7rem", color: "#64748b" }}>{s.subgroups.join(", ")}</span>}
                                    <div style={{ display: "flex", gap: "0.25rem", flexWrap: "wrap", alignItems: "center" }}>
                                      {s.history.map((h, i) => {
                                        const hReassess = (s.reassessedAssessments || []).find(r => r.assessment === h.assessment);
                                        return (
                                          <span key={i} title={h.assessment + (hReassess ? ` (reassessed from ${hReassess.originalPct}%)` : "")}
                                            style={{ background: h.score >= 70 ? "#dcfce7" : "#fee2e2", color: h.score >= 70 ? "#15803d" : "#dc2626", borderRadius: 3, padding: "0.1rem 0.35rem", fontSize: "0.68rem", fontWeight: 700, display: "inline-flex", alignItems: "center", gap: "0.15rem" }}>
                                            {hReassess && (
                                              <span style={{ color: hReassess.originalPct >= 70 ? "#15803d" : "#dc2626", opacity: 0.65, textDecoration: "line-through", fontSize: "0.62rem" }}>{hReassess.originalPct}%</span>
                                            )}
                                            {hReassess && <span style={{ opacity: 0.5, fontSize: "0.6rem" }}>↑</span>}
                                            {h.score}%
                                          </span>
                                        );
                                      })}
                                      {s.history.length > 0 && <span style={{ color: "#94a3b8", fontSize: "0.65rem" }}>→</span>}
                                      {(() => {
                                        const curReassess = (s.reassessedAssessments || []).find(r => r.assessment === currentAssessmentName);
                                        return (
                                          <span style={{ background: s.proficient ? "#dcfce7" : "#fee2e2", color: s.proficient ? "#15803d" : "#dc2626", borderRadius: 3, padding: "0.1rem 0.35rem", fontSize: "0.68rem", fontWeight: 800, outline: "2px solid currentColor", outlineOffset: 1, display: "inline-flex", alignItems: "center", gap: "0.15rem" }}>
                                            {curReassess && (
                                              <span style={{ color: curReassess.originalPct >= 70 ? "#15803d" : "#dc2626", opacity: 0.65, textDecoration: "line-through", fontSize: "0.62rem" }}>{curReassess.originalPct}%</span>
                                            )}
                                            {curReassess && <span style={{ opacity: 0.5, fontSize: "0.6rem" }}>↑</span>}
                                            {s.pct}%
                                          </span>
                                        );
                                      })()}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          }
                        </div>
                      );
                    })}
                  </div>
                );
              })()}

              {/* ── SMALL SUBGROUP SPOTLIGHT ── */}
              {growthData && Object.values(growthData.subgroupStats).some(sg => !sg.large) && (() => {
                const smallSgs = Object.values(growthData.subgroupStats).filter(sg => !sg.large);
                const riskOrder = { "PERSISTENTLY_AT_RISK": 0, "AT_RISK": 1, "RECOVERING": 2, "OK": 3 };
                const riskLabels = {
                  "PERSISTENTLY_AT_RISK": { label: "Persistently At Risk", color: "#dc2626", bg: "#fee2e2" },
                  "AT_RISK": { label: "At Risk", color: "#d97706", bg: "#fef9c3" },
                  "RECOVERING": { label: "Recovering", color: "#7c3aed", bg: "#f5f3ff" },
                  "OK": { label: "Proficient", color: "#15803d", bg: "#dcfce7" },
                };
                const teacherKeys = [...new Set(growthData.enriched.map(s => s.teacherName || s.teacherLabel))].sort();
                return (
                  <div style={{ marginBottom: "1.75rem" }}>
                    <h2 style={{ color: "#0f172a", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.25rem", fontFamily: "'Lora', serif" }}>🔦 Small Subgroup Spotlight</h2>
                    <p style={{ fontSize: "0.78rem", color: "#64748b", margin: "0 0 0.75rem", lineHeight: 1.5 }}>
                      These subgroups have 20 or fewer students — too small for reliable group comparisons. Each student is listed individually by teacher. Focus on growth conversation: what's working for students thriving, and what support might help those who are not?
                    </p>
                    {smallSgs.map(sg => {
                      const allRows = [];
                      teacherKeys.forEach(tk => {
                        const members = growthData.enriched.filter(s => (s.teacherName || s.teacherLabel) === tk && s.subgroups.includes(sg.name));
                        if (!members.length) return;
                        const sorted = [...members].sort((a, b) => (riskOrder[a.riskStatus] ?? 3) - (riskOrder[b.riskStatus] ?? 3) || a.name.localeCompare(b.name));
                        sorted.forEach((s, i) => allRows.push({ ...s, teacherKey: tk, firstInTeacher: i === 0, teacherCount: sorted.length }));
                      });
                      if (!allRows.length) return null;
                      const avgPct = Math.round(allRows.reduce((a, s) => a + s.pct, 0) / allRows.length);
                      const profCount2 = allRows.filter(s => s.proficient).length;
                      return (
                        <div key={sg.name} style={{ marginBottom: "1.25rem" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: "0.75rem", marginBottom: "0.5rem" }}>
                            <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.9rem" }}>{sg.name}</div>
                            <div style={{ fontSize: "0.7rem", color: "#64748b" }}>n={allRows.length} · avg {avgPct}% · {profCount2}/{allRows.length} proficient</div>
                          </div>
                          <div style={{ background: "white", borderRadius: 8, overflow: "hidden", border: "1px solid #e2e8f0" }}>
                            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.78rem" }}>
                              <thead>
                                <tr style={{ background: "#f8fafc" }}>
                                  {["Teacher","Student","Status","Score History → Current"].map(h => (
                                    <th key={h} style={{ padding: "0.45rem 0.7rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "2px solid #e2e8f0", fontSize: "0.72rem" }}>{h}</th>
                                  ))}
                                </tr>
                              </thead>
                              <tbody>
                                {allRows.map((s, i) => {
                                  const rl = riskLabels[s.riskStatus] || riskLabels["OK"];
                                  return (
                                    <tr key={i} style={{ borderBottom: "1px solid #f1f5f9", background: i % 2 === 0 ? "white" : "#fafafa" }}>
                                      <td style={{ padding: "0.4rem 0.7rem", fontWeight: 600, color: "#0f766e", verticalAlign: "top" }}>{s.firstInTeacher ? s.teacherKey : ""}</td>
                                      <td style={{ padding: "0.4rem 0.7rem", fontWeight: 500 }}>{s.name}</td>
                                      <td style={{ padding: "0.4rem 0.7rem" }}>
                                        <span style={{ background: rl.bg, color: rl.color, borderRadius: 4, padding: "0.1rem 0.4rem", fontSize: "0.68rem", fontWeight: 800 }}>{rl.label}</span>
                                      </td>
                                      <td style={{ padding: "0.4rem 0.7rem" }}>
                                        <div style={{ display: "flex", gap: "0.25rem", flexWrap: "wrap", alignItems: "center" }}>
                                          {s.history.map((h, j) => (
                                            (() => {
                                              const hReassess = (s.reassessedAssessments || []).find(r => r.assessment === h.assessment);
                                              return (
                                                <span key={j} title={h.assessment + (hReassess ? ` (reassessed from ${hReassess.originalPct}%)` : "")}
                                                  style={{ background: h.score >= 70 ? "#dcfce7" : "#fee2e2", color: h.score >= 70 ? "#15803d" : "#dc2626", borderRadius: 3, padding: "0.1rem 0.3rem", fontSize: "0.68rem", fontWeight: 700, display: "inline-flex", alignItems: "center", gap: "0.15rem" }}>
                                                  {hReassess && <span style={{ color: hReassess.originalPct >= 70 ? "#15803d" : "#dc2626", opacity: 0.65, textDecoration: "line-through", fontSize: "0.6rem" }}>{hReassess.originalPct}%</span>}
                                                  {hReassess && <span style={{ opacity: 0.5, fontSize: "0.58rem" }}>↑</span>}
                                                  {h.score}%
                                                </span>
                                              );
                                            })()
                                          ))}
                                          {s.history.length > 0 && <span style={{ color: "#94a3b8", fontSize: "0.65rem" }}>→</span>}
                                          {(() => {
                                            const curReassess = (s.reassessedAssessments || []).find(r => r.assessment === currentAssessmentName);
                                            return (
                                              <span style={{ background: s.proficient ? "#dcfce7" : "#fee2e2", color: s.proficient ? "#15803d" : "#dc2626", borderRadius: 3, padding: "0.1rem 0.3rem", fontSize: "0.68rem", fontWeight: 800, outline: "2px solid currentColor", outlineOffset: 1, display: "inline-flex", alignItems: "center", gap: "0.15rem" }}>
                                                {curReassess && <span style={{ color: curReassess.originalPct >= 70 ? "#15803d" : "#dc2626", opacity: 0.65, textDecoration: "line-through", fontSize: "0.6rem" }}>{curReassess.originalPct}%</span>}
                                                {curReassess && <span style={{ opacity: 0.5, fontSize: "0.58rem" }}>↑</span>}
                                                {s.pct}%
                                              </span>
                                            );
                                          })()}
                                        </div>
                                      </td>
                                    </tr>
                                  );
                                })}
                              </tbody>
                            </table>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })()}

              {/* ── REASSESSMENT TRACKER ── */}
              {growthData && growthData.reassessments.length > 0 && (() => {
                const items = growthData.reassessments;

                // Flatten all reassessed instances for summary counts
                const allInstances = items.flatMap(s => s.reassessedAssessments);
                const crossedCount = allInstances.filter(r => r.crossedProficiency).length;
                const alreadyProfCount = allInstances.filter(r => !r.crossedProficiency && r.originalPct >= 70).length;
                const stillBelowCount = allInstances.filter(r => !r.crossedProficiency && r.originalPct < 70).length;
                // Multi-assessment reassessors: reassessed on 2+ tests this session or had prior reassessments in history
                const multiReassessors = items.filter(s =>
                  s.reassessedAssessments.length > 1 ||
                  s.history.some(h => h.originalScore !== null && h.originalScore !== undefined)
                );

                const gradeLabel = (pct) => pct >= 90 ? "A" : pct >= 80 ? "B" : pct >= 70 ? "C" : pct >= 60 ? "D" : "F";
                const gradeColor = (pct) => pct >= 90 ? "#15803d" : pct >= 80 ? "#65a30d" : pct >= 70 ? "#d97706" : pct >= 60 ? "#ea580c" : "#dc2626";
                const gradeBg   = (pct) => pct >= 90 ? "#dcfce7" : pct >= 80 ? "#f0fdf4" : pct >= 70 ? "#fef9c3" : pct >= 60 ? "#fff7ed" : "#fee2e2";

                return (
                  <div style={{ marginBottom: "1.75rem" }}>
                    <h2 style={{ color: "#0f172a", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.25rem", fontFamily: "'Lora', serif" }}>🔄 Reassessment Tracker</h2>
                    <p style={{ fontSize: "0.78rem", color: "#64748b", margin: "0 0 0.75rem", lineHeight: 1.5 }}>
                      Students whose scores changed since the last session, organized by teacher then by assessment. Key PLC question: are the students reassessing those who were already proficient, or those who needed additional support?
                    </p>

                    {/* Summary chips */}
                    <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", marginBottom: "1rem" }}>
                      <span style={{ background: "#f5f3ff", color: "#7c3aed", borderRadius: 20, padding: "0.2rem 0.7rem", fontSize: "0.72rem", fontWeight: 700 }}>{items.length} students · {allInstances.length} reassessment{allInstances.length !== 1 ? "s" : ""}</span>
                      {crossedCount > 0 && <span style={{ background: "#dcfce7", color: "#15803d", borderRadius: 20, padding: "0.2rem 0.7rem", fontSize: "0.72rem", fontWeight: 700 }}>✓ {crossedCount} crossed into proficiency</span>}
                      {alreadyProfCount > 0 && <span style={{ background: "#fef9c3", color: "#92400e", borderRadius: 20, padding: "0.2rem 0.7rem", fontSize: "0.72rem", fontWeight: 700 }}>⚠ {alreadyProfCount} already proficient</span>}
                      {stillBelowCount > 0 && <span style={{ background: "#fee2e2", color: "#dc2626", borderRadius: 20, padding: "0.2rem 0.7rem", fontSize: "0.72rem", fontWeight: 700 }}>✗ {stillBelowCount} still below proficiency</span>}
                      {multiReassessors.length > 0 && <span style={{ background: "#fff7ed", color: "#c2410c", borderRadius: 20, padding: "0.2rem 0.7rem", fontSize: "0.72rem", fontWeight: 700 }}>↻ {multiReassessors.length} reassessed on multiple assessments</span>}
                    </div>

                    <div style={{ background: "white", borderRadius: 10, overflow: "hidden", border: "1px solid #e2e8f0" }}>
                      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.8rem" }}>
                        <thead>
                          <tr style={{ background: "#f8fafc" }}>
                            {["Student", "Assessment", "Original", "Reassessed", "Outcome"].map(h => (
                              <th key={h} style={{ padding: "0.5rem 0.75rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "2px solid #e2e8f0", fontSize: "0.72rem", whiteSpace: "nowrap" }}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {(() => {
                            // Group: Teacher → Student (alpha) → Assessment (alpha)
                            const teacherNames = [...new Set(items.map(s => s.teacherName || s.teacherLabel))].sort();
                            const rows = [];
                            teacherNames.forEach((tName, ti) => {
                              const teacherItems = [...items.filter(s => (s.teacherName || s.teacherLabel) === tName)]
                                .sort((a, b) => a.name.localeCompare(b.name));

                              // Teacher header row
                              rows.push(
                                <tr key={"t-" + tName} style={{ background: "#e0f7f4" }}>
                                  <td colSpan={5} style={{ padding: "0.55rem 0.75rem", fontWeight: 800, color: "#0f766e", fontSize: "0.88rem", borderBottom: "2px solid #99f6e4", borderTop: ti > 0 ? "3px solid #0f766e" : "none", letterSpacing: "0.01em" }}>
                                    {tName} <span style={{ fontWeight: 500, fontSize: "0.72rem", color: "#0d9488", marginLeft: "0.4rem" }}>· {teacherItems.length} student{teacherItems.length !== 1 ? "s" : ""}</span>
                                  </td>
                                </tr>
                              );

                              // Each student, then their assessments sorted alphabetically
                              teacherItems.forEach((s, si) => {
                                const isMulti = s.reassessedAssessments.length > 1 ||
                                  s.history.some(h => h.originalScore !== null && h.originalScore !== undefined);
                                const sortedAssess = [...s.reassessedAssessments]
                                  .sort((a, b) => a.assessment.localeCompare(b.assessment));

                                sortedAssess.forEach((r, ri) => {
                                  const gain = r.newPct - r.originalPct;
                                  const origWasProf = r.originalPct >= 70;
                                  const isFirstRow = ri === 0;
                                  const isLastRow = ri === sortedAssess.length - 1;
                                  rows.push(
                                    <tr key={tName + "-" + s.name + "-" + r.assessment}
                                      style={{ borderBottom: isLastRow ? "2px solid #e8f5f2" : "1px solid #f1f5f9", background: si % 2 === 0 ? "white" : "#fafafa" }}>
                                      {/* Student name — only on first assessment row */}
                                      <td style={{ padding: "0.45rem 0.75rem", fontWeight: 600, color: "#0f172a", verticalAlign: "top" }}>
                                        {isFirstRow && (
                                          <div style={{ display: "flex", alignItems: "center", gap: "0.35rem" }}>
                                            {s.name}
                                            {isMulti && <span style={{ background: "#fff7ed", color: "#c2410c", borderRadius: 4, padding: "0.05rem 0.3rem", fontSize: "0.6rem", fontWeight: 800 }}>↻</span>}
                                          </div>
                                        )}
                                      </td>
                                      <td style={{ padding: "0.45rem 0.75rem", color: "#475569", fontSize: "0.75rem" }}>
                                        {r.assessment}
                                        {r.assessment === currentAssessmentName && <span style={{ marginLeft: "0.3rem", fontSize: "0.62rem", color: "#0f766e", fontWeight: 700 }}>current</span>}
                                      </td>
                                      <td style={{ padding: "0.45rem 0.75rem" }}>
                                        <div style={{ display: "flex", alignItems: "center", gap: "0.3rem" }}>
                                          <span style={{ background: gradeBg(r.originalPct), color: gradeColor(r.originalPct), borderRadius: 4, padding: "0.1rem 0.35rem", fontSize: "0.72rem", fontWeight: 800 }}>{gradeLabel(r.originalPct)}</span>
                                          <span style={{ fontWeight: 600 }}>{r.originalPct}%</span>
                                        </div>
                                      </td>
                                      <td style={{ padding: "0.45rem 0.75rem" }}>
                                        <div style={{ display: "flex", alignItems: "center", gap: "0.3rem" }}>
                                          <span style={{ background: gradeBg(r.newPct), color: gradeColor(r.newPct), borderRadius: 4, padding: "0.1rem 0.35rem", fontSize: "0.72rem", fontWeight: 800 }}>{gradeLabel(r.newPct)}</span>
                                          <span style={{ fontWeight: 600 }}>{r.newPct}%</span>
                                          <span style={{ color: "#15803d", fontSize: "0.7rem", fontWeight: 700 }}>(+{gain}%)</span>
                                        </div>
                                      </td>
                                      <td style={{ padding: "0.45rem 0.75rem" }}>
                                        {r.crossedProficiency
                                          ? <span style={{ background: "#dcfce7", color: "#15803d", borderRadius: 4, padding: "0.1rem 0.45rem", fontSize: "0.7rem", fontWeight: 700 }}>Not Prof → Proficient</span>
                                          : origWasProf
                                            ? <span style={{ background: "#fef9c3", color: "#92400e", borderRadius: 4, padding: "0.1rem 0.45rem", fontSize: "0.7rem", fontWeight: 700 }}>Already Proficient</span>
                                            : <span style={{ background: "#fee2e2", color: "#dc2626", borderRadius: 4, padding: "0.1rem 0.45rem", fontSize: "0.7rem", fontWeight: 700 }}>Still Not Proficient</span>
                                        }
                                      </td>
                                    </tr>
                                  );
                                });
                              });
                            });
                            return rows;
                          })()}
                        </tbody>
                      </table>
                    </div>
                  </div>
                );
              })()}

              {/* ── EXPORT ACTIONS ── */}
              {!isSnapshot && (
              <div className="no-print" style={{ borderTop: "1px solid #e2e8f0", paddingTop: "1.5rem", marginTop: "0.5rem", display: "flex", flexDirection: "column", gap: "1rem" }}>
                {/* HTML Snapshot Export */}
                <div style={{ background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 10, padding: "1rem 1.25rem" }}>
                  <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.9rem", marginBottom: "0.3rem" }}>📸 Save Interactive Snapshot</div>
                  <p style={{ fontSize: "0.78rem", color: "#475569", margin: "0 0 0.75rem" }}>
                    Downloads a self-contained HTML file with all data embedded. Open it in any browser — the full report is interactive: collapsible sections, risk tracking, subgroup breakdowns, everything. Share with admin or bring to your next PLC meeting.
                  </p>
                  <button
                    onClick={downloadSnapshot}
                    style={{ background: "#1e40af", color: "white", border: "none", borderRadius: 8, padding: "0.5rem 1.2rem", fontSize: "0.85rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                    📸 Download Snapshot
                  </button>
                </div>

                {/* Analytics CSV Export */}
                {growthData && (
                  <div style={{ background: "#f0fdfa", border: "1px solid #99f6e4", borderRadius: 10, padding: "1rem 1.25rem" }}>
                    <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.9rem", marginBottom: "0.3rem" }}>📥 Save Analytics for Next Session</div>
                    <p style={{ fontSize: "0.78rem", color: "#475569", margin: "0 0 0.75rem" }}>
                      Download and upload this file next session alongside the new IC gradebook export. It enables risk tracking, reassessment detection, and cross-assessment pattern analysis.
